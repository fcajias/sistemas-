        function logAuditAction(action, product, qty) {
            const dateStr = new Date().toLocaleString('es-EC', { hour12: false });
            const ip = currentAdminSession === 'David Cajias' ? '192.168.1.22' : currentAdminSession === 'Joel Congache' ? '192.168.1.18' : '192.168.1.10';
            
            const log = {
                date: dateStr,
                user: currentAdminSession,
                action: action,
                product: product,
                qty: qty > 0 ? `+${qty}` : qty,
                ip: ip
            };
            
            AUDIT_LOG.unshift(log);
            if(AUDIT_LOG.length > 200) AUDIT_LOG.pop(); 
            localStorage.setItem('sicp_audit_log', JSON.stringify(AUDIT_LOG));

            if (EXCEL_API_URL) {
                fetch(`${EXCEL_API_URL}?action=log_audit&date=${encodeURIComponent(dateStr)}&user=${encodeURIComponent(currentAdminSession)}&actionName=${encodeURIComponent(action)}&product=${encodeURIComponent(product)}&qty=${encodeURIComponent(log.qty)}&ip=${encodeURIComponent(ip)}&t=${new Date().getTime()}`, { redirect: 'follow' }).catch(e=>e);
            }
        }

        async function loadData() {
            if (!EXCEL_API_URL) return;
            isSyncing = true;
            render();
            try {
                const res = await fetch(`${EXCEL_API_URL}?action=read_all&t=${new Date().getTime()}`, { redirect: 'follow' });
                if (!res.ok) throw new Error('Error en servidor');
                const data = await res.json(); 
                
                if (data.inventory) {
                    INVENTORY.forEach(item => {
                        if (data.inventory[item.id] !== undefined) {
                            item.stock = parseInt(data.inventory[item.id].stock);
                            item.lastModBy = data.inventory[item.id].lastModifiedBy || "-";
                            item.lastModDate = data.inventory[item.id].lastModifiedDate || "-";
                        }
                    });
                }
                if (data.pending) PENDING_REQUESTS = data.pending;
                if (data.audit && data.audit.length > 0) {
                    AUDIT_LOG = data.audit;
                    localStorage.setItem('sicp_audit_log', JSON.stringify(AUDIT_LOG));
                }
            } catch(e) {} finally {
                isSyncing = false;
                render();
            }
        }

                    }
                    if (data.inventory) {
                        INVENTORY.forEach(item => {
                            if (data.inventory[item.id] !== undefined) {
                                const newData = data.inventory[item.id];
                                if (item.stock !== parseInt(newData.stock) || item.lastModDate !== newData.lastModifiedDate) { 
                                    item.stock = parseInt(newData.stock); item.lastModBy = newData.lastModifiedBy; item.lastModDate = newData.lastModifiedDate; hasChanges = true; 
                                }
                            }
                        });
                    }
                    if (data.audit && JSON.stringify(AUDIT_LOG) !== JSON.stringify(data.audit)) {
                        AUDIT_LOG = data.audit; hasChanges = true;
                    }
                    if (hasChanges && document.activeElement.tagName !== 'INPUT') render();
                } catch(e) {}
            }, 10000); 
        }
        function stopBackgroundSync() { if (backgroundSyncTimer) { clearInterval(backgroundSyncTimer); backgroundSyncTimer = null; } }

        function adminUpdateStock(id, newStock) {
            const item = INVENTORY.find(i => i.id === id);
            const oldStock = item.stock;
            item.stock = parseInt(newStock) || 0;
            item.lastModBy = currentAdminSession;
            item.lastModDate = new Date().toLocaleTimeString();
            
            const diff = item.stock - oldStock;
            
            render(); 

            if (diff !== 0) {
                logAuditAction('Ajuste Manual', item.name, diff);
            }

            if (!EXCEL_API_URL) return;
            try {
                fetch(`${EXCEL_API_URL}?action=update&id=${id}&stock=${item.stock}&user=${encodeURIComponent(currentAdminSession)}&date=${encodeURIComponent(item.lastModDate)}&t=${new Date().getTime()}`, { redirect: 'follow' });
            } catch(e) { showToast(`Error API`, 'error'); }
        }

        function processRequest(reqId) {
            if (!currentAdminSession) { goToAdmin(); return; }
            const request = PENDING_REQUESTS.find(r => r.id === reqId);
            if (!request) return;
            
            let updates = [];
            let finalItemsText = "";
            const nowStr = new Date().toLocaleTimeString();
            
            for (let index = 0; index < request.items.length; index++) {
                 const itemReq = request.items[index];
                 const inputEl = document.getElementById(`edit_qty_${reqId}_${index}`);
                 const approvedQty = inputEl ? parseInt(inputEl.value) || 0 : 0;

                 if (approvedQty > 0) {
                     const invItem = INVENTORY.find(i => i.id === itemReq.id);
                     if (invItem) {
                         if (approvedQty > invItem.stock) { alert(`Stock insuficiente de ${itemReq.name}`); return; }
                         invItem.stock = Math.max(0, invItem.stock - approvedQty);
                         invItem.lastModBy = currentAdminSession;
                         invItem.lastModDate = nowStr;
                         updates.push({id: invItem.id, stock: invItem.stock, user: currentAdminSession, date: nowStr});
                         
                         logAuditAction('Despacho', itemReq.name, -approvedQty);

                         finalItemsText += approvedQty !== itemReq.qty ? `${approvedQty}x ${itemReq.name} (Pidió ${itemReq.qty}), ` : `${approvedQty}x ${itemReq.name}, `;
                     }
                 }
            }
            if (finalItemsText === "") return;
            PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
            submitToGoogleForms(request.leaderName, finalItemsText, `PROCESADA (${currentAdminSession})`);
            render(); 
            
            if (EXCEL_API_URL) {
                try {
                    Promise.all(updates.map(u => fetch(`${EXCEL_API_URL}?action=update&id=${u.id}&stock=${u.stock}&user=${encodeURIComponent(u.user)}&date=${encodeURIComponent(u.date)}&t=${new Date().getTime()}`, { redirect: 'follow' })));
                    fetch(`${EXCEL_API_URL}?action=remove_pending&reqId=${reqId}&t=${new Date().getTime()}`, { redirect: 'follow' });
                } catch(e) {}
            }
        }
        
        function rejectRequest(reqId) {
            if (confirm("¿Rechazar pedido?")) {
                const request = PENDING_REQUESTS.find(r => r.id === reqId);
                let originalItemsText = request.items.map(i => `${i.qty}x ${i.name}`).join(', ');
                
                logAuditAction('Rechazo', 'Solicitud Cancelada', 0);
                
                submitToGoogleForms(request.leaderName, originalItemsText, `RECHAZADA (${currentAdminSession})`);
                PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
                render();
                if (EXCEL_API_URL) fetch(`${EXCEL_API_URL}?action=remove_pending&reqId=${reqId}&t=${new Date().getTime()}`, { redirect: 'follow' }).catch(e=>e);
            }
        }

        function processNewHireKit(event) {
            event.preventDefault();
            const empName = document.getElementById('kitEmpName').value;
            const incMouse = document.getElementById('kitMouse').checked;
            const incCharger = document.getElementById('kitCharger').checked;
            const incNetCable = document.getElementById('kitNetCable').checked;
            
            const incHeadphonesSimple = document.getElementById('kitHeadphonesSimple').checked;
            const incHeadphonesDouble = document.getElementById('kitHeadphonesDouble').checked;
            const incKeyboard = document.getElementById('kitKeyboard').checked;

            if(!empName) return;
            
            if (incHeadphonesSimple && incHeadphonesDouble) {
                alert("❌ Por favor, selecciona solo un tipo de audífonos.");
                return;
            }

            let itemsToDeduct = [];
            if(incMouse) itemsToDeduct.push({id: '1', name: 'Mouse', qty: 1});
            if(incCharger) itemsToDeduct.push({id: '9', name: 'Cargador de laptop', qty: 1});
            if(incNetCable) itemsToDeduct.push({id: '5', name: 'Cable de Red', qty: 1});
            if(incKeyboard) itemsToDeduct.push({id: '2', name: 'Teclado', qty: 1});
            if(incHeadphonesSimple) itemsToDeduct.push({id: '3', name: 'Audífonos simples', qty: 1});
            if(incHeadphonesDouble) itemsToDeduct.push({id: '4', name: 'Audífonos dobles', qty: 1});

            for(let itemReq of itemsToDeduct) {
                const invItem = INVENTORY.find(i => i.id === itemReq.id);
                if(invItem.stock < 1) {
                    alert(`❌ No hay stock suficiente de: ${itemReq.name}`);
                    return;
                }
            }

            const nowStr = new Date().toLocaleTimeString();
            let updates = [];
            
            itemsToDeduct.forEach(itemReq => {
                const invItem = INVENTORY.find(i => i.id === itemReq.id);
                invItem.stock -= 1;
                invItem.lastModBy = currentAdminSession;
                invItem.lastModDate = nowStr;
                updates.push({id: invItem.id, stock: invItem.stock, user: currentAdminSession, date: nowStr});

                logAuditAction(`Dotación a: ${empName}`, itemReq.name, -1);
            });

            isKitModalOpen = false;
            render();
            showToast("📦 Dotación registrada exitosamente", "success");

            if (EXCEL_API_URL) {
                try {
                    Promise.all(updates.map(u => fetch(`${EXCEL_API_URL}?action=update&id=${u.id}&stock=${u.stock}&user=${encodeURIComponent(u.user)}&date=${encodeURIComponent(u.date)}&t=${new Date().getTime()}`, { redirect: 'follow' })));

                    console.error("Error sincronizando", e);
                }
            }
        }

            cart[id] = newQty;

            let form = document.createElement('form'); form.action = GOOGLE_FORM_URL; form.method = 'POST'; form.target = 'hidden_iframe';

                // --- MOTOR ESTADÍSTICO 100% REAL ---
                const realConsumption = {};
                const monthlyData = {};
                const monthNames = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
                
                // Función robusta para extraer el mes de cualquier formato de fecha que dé Excel/JS
                const getMonthFromDate = (dStr) => {
                    if(!dStr) return -1;
                    const s = dStr.toString();
                    
                    // Intento 1: Parseo de fecha estándar ("Sat Mar 07 2026...") o ISO
                    const d = new Date(s);
                    if(!isNaN(d.getTime()) && !s.match(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}/)) {
                        return d.getMonth();
                    }
                    
                    // Intento 2: Parseo estricto local "DD/MM/YYYY" o "D/M/YYYY"
                    const m = s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
                    if(m) {
                        return parseInt(m[2], 10) - 1; // [2] es el mes
                    }
                    
                    return -1;
                };

                // 1. Inicializar gráfico de Marzo a Diciembre en 0
                for (let i = 2; i <= 11; i++) {
                    monthlyData[monthNames[i]] = 0;
                }

                // 2. Extraer datos reales del AUDIT_LOG
                AUDIT_LOG.forEach(log => {
                    if (log.qty && log.qty.toString().includes('-')) {
                        const amount = Math.abs(parseInt(log.qty));
                        if (!isNaN(amount)) {
                            // Sumar a Top 4
                            realConsumption[log.product] = (realConsumption[log.product] || 0) + amount;
                            
                            // Sumar al Gráfico Mensual
                            const mIdx = getMonthFromDate(log.date);
                            if (mIdx >= 2 && mIdx <= 11) {
                                monthlyData[monthNames[mIdx]] += amount;
                            }
                        }
                    }
                });

                // 3. Dibujar Top 4
                const sortedConsumption = Object.entries(realConsumption).sort((a, b) => b[1] - a[1]).slice(0, 4);

                if (sortedConsumption.length === 0) {
                    top4Html = `<div class="text-center text-slate-400 text-sm py-6 font-medium">Aún no hay datos reales registrados.</div>`;

                    top4Html = sortedConsumption.map(([prod, qty], index) => {

                        const colors = ['bg-indigo-500', 'bg-blue-500', 'bg-emerald-500', 'bg-purple-500'];
                        return `
                        <div>

                let maxMonthlyConsumption = Math.max(...displayMonths.map(m => monthlyData[m]), 1);

                displayMonths.forEach((m) => {

                    dynamicBarsHtml += `
                        <div class="flex flex-col items-center justify-end h-full flex-1 min-w-0">
                            <span class="text-[9px] sm:text-[10px] ${numClass} mb-1">${val}</span>
                            <div class="w-5 sm:w-8 ${barClass} rounded-t-md transition-all duration-1000 ease-out" style="height: ${heightPx}px;"></div>
                            <span class="text-[9px] sm:text-xs ${textClass} mt-2 w-full text-center truncate">${m}</span>
                        </div>`;
                });
                // --- FIN MOTOR ESTADÍSTICO ---

                // ==========================================
                // 📦 TABLA DE INVENTARIO COMPARTIDA (HTML REUTILIZABLE)
                // ==========================================
                let inventoryRowsHtml = '';
                INVENTORY.forEach(item => {
                    const isZero = item.stock <= 0;
                    const isLowStock = item.stock > 0 && item.stock <= item.minStock;
                    const pct = Math.min(100, Math.max(0, (item.stock / item.maxStock) * 100)); // Porcentaje para la barra horizontal
                    
                    let colorClasses = '';
                    let barColorClass = '';

                    if (isZero) {
                        colorClasses = 'border-red-300 dark:border-red-800 text-red-700 dark:text-red-400 bg-red-50 dark:bg-red-900/30';
                        barColorClass = 'bg-red-500';
                    } else if (isLowStock) {
                        colorClasses = 'border-orange-300 dark:border-orange-800 text-orange-700 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/30';
                        barColorClass = 'bg-orange-500';
                    } else {
                        colorClasses = 'border-emerald-300 dark:border-emerald-800 text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30';
                        barColorClass = 'bg-emerald-500';
                    }

                    let readOnlyColorClasses = isZero 
                        ? 'border-red-200 dark:border-red-900/50 text-red-600 dark:text-red-400 bg-red-50/50 dark:bg-red-900/20'
                        : isLowStock 
                            ? 'border-orange-200 dark:border-orange-900/50 text-orange-600 dark:text-orange-400 bg-orange-50/50 dark:bg-orange-900/20'
                            : 'border-emerald-200 dark:border-emerald-900/50 text-emerald-600 dark:text-emerald-400 bg-emerald-50/50 dark:bg-emerald-900/20';

                    const stockInputHtml = isTech 
                        ? `<input type="number" value="${item.stock}" onchange="adminUpdateStock('${item.id}', this.value)" class="w-16 text-center text-sm font-bold border rounded px-1 py-1 focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 outline-none transition-all shadow-sm ${colorClasses}">`
                        : `<div class="w-16 mx-auto text-center text-sm font-bold border rounded px-1 py-1 shadow-sm ${readOnlyColorClasses}">${item.stock}</div>`;

                    const auditHtml = item.lastModBy ? `<span class="block text-[10px] text-slate-400 dark:text-slate-500 font-normal mt-0.5">${t('lastMod')} ${item.lastModBy} (${item.lastModDate})</span>` : '';
