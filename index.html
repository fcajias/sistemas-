        input[type="number"]::-webkit-inner-spin-button,

            const icon = document.getElementById('theme-icon');
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                icon.setAttribute('data-lucide', 'sun');
            } else {
                document.documentElement.classList.remove('dark');
                icon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('sicp_theme', isDarkMode ? 'dark' : 'light');
            updateThemeUI();
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const iconContainer = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerHTML = msg;
            
            if(type === 'error') {
                iconContainer.className = 'bg-red-500/20 p-2 rounded-full text-red-500 dark:text-red-400';
                iconContainer.innerHTML = '<i data-lucide="alert-circle" class="w-5 h-5"></i>';
            } else if (type === 'success') {
                iconContainer.className = 'bg-emerald-500/20 p-2 rounded-full text-emerald-500 dark:text-emerald-400';
                iconContainer.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i>';

            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 4000);

        async function loadData() {
            if (!EXCEL_API_URL) return;
            isSyncing = true;
            render();
            try {
                const url = EXCEL_API_URL + "?action=read_all&t=" + new Date().getTime();
                const res = await fetch(url, { redirect: 'follow' });
                if (!res.ok) throw new Error('Error en servidor');
                const data = await res.json(); 
                
                let actualizoAlgo = false;
                if (data.inventory) {
                    INVENTORY.forEach(item => {
                        if (data.inventory[item.id] !== undefined) {
                            item.stock = parseInt(data.inventory[item.id]);
                            actualizoAlgo = true;
                        }
                    });
                }
                if (data.pending) PENDING_REQUESTS = data.pending;
                
                localStorage.setItem('sicp_stock_data', JSON.stringify(INVENTORY));
                localStorage.setItem('sicp_pending_requests', JSON.stringify(PENDING_REQUESTS));
            } catch(e) {
                console.error(e);
                const savedInv = localStorage.getItem('sicp_stock_data');
                if (savedInv) INVENTORY = JSON.parse(savedInv);
                const savedReq = localStorage.getItem('sicp_pending_requests');
                if (savedReq) PENDING_REQUESTS = JSON.parse(savedReq);
            } finally {
                isSyncing = false;
                render();
            }
        }

        function startBackgroundSync() {
            if (backgroundSyncTimer) clearInterval(backgroundSyncTimer);
            backgroundSyncTimer = setInterval(async () => {
                if (currentView !== 'admin' || !EXCEL_API_URL) return;
                try {
                    const url = EXCEL_API_URL + "?action=read_all&t=" + new Date().getTime();
                    const res = await fetch(url, { redirect: 'follow' });
                    if (!res.ok) return;
                    const data = await res.json(); 
                    
                    let hasChanges = false;
                    if (data.pending) {
                        const currentPendStr = JSON.stringify(PENDING_REQUESTS);
                        const newPendStr = JSON.stringify(data.pending);
                        if (currentPendStr !== newPendStr) {
                            PENDING_REQUESTS = data.pending;
                            localStorage.setItem('sicp_pending_requests', newPendStr);
                            hasChanges = true;
                        }
                    }
                    if (data.inventory) {
                        INVENTORY.forEach(item => {
                            if (data.inventory[item.id] !== undefined) {
                                const newStock = parseInt(data.inventory[item.id]);
                                if (item.stock !== newStock) { item.stock = newStock; hasChanges = true; }
                            }
                        });
                        if (hasChanges) localStorage.setItem('sicp_stock_data', JSON.stringify(INVENTORY));
                    }

                    if (hasChanges && document.activeElement.tagName !== 'INPUT') {
                        render();
                    }
                } catch(e) {}
            }, 10000); 
        }

        function stopBackgroundSync() {
            if (backgroundSyncTimer) { clearInterval(backgroundSyncTimer); backgroundSyncTimer = null; }
        }

        async function adminUpdateStock(id, nombreProducto, newStock) {
            const item = INVENTORY.find(i => i.id === id);
            item.stock = parseInt(newStock) || 0;
            localStorage.setItem('sicp_stock_data', JSON.stringify(INVENTORY));
            render(); 

            if (!EXCEL_API_URL) return;
            try {
                const url = `${EXCEL_API_URL}?action=update&id=${id}&stock=${item.stock}&t=${new Date().getTime()}`;
                await fetch(url, { redirect: 'follow' });
            } catch(e) { showToast(`❌ Error API`, 'error'); }
        }

        async function processRequest(reqId) {
            if (!currentAdminSession) { goToAdmin(); return; }
            const request = PENDING_REQUESTS.find(r => r.id === reqId);
            if (!request) return;
            
            let updates = [];
            let finalItemsText = "";
            
            for (let index = 0; index < request.items.length; index++) {
                 const itemReq = request.items[index];
                 const inputEl = document.getElementById(`edit_qty_${reqId}_${index}`);
                 const approvedQty = inputEl ? parseInt(inputEl.value) || 0 : 0;

                 if (approvedQty > 0) {
                     const invItem = INVENTORY.find(i => i.id === itemReq.id);
                     if (invItem) {
                         if (approvedQty > invItem.stock) {
                             alert(`Stock insuficiente de ${itemReq.name}`);
                             return;
                         }
                         invItem.stock = Math.max(0, invItem.stock - approvedQty);
                         updates.push({id: invItem.id, stock: invItem.stock});
                         
                         if (approvedQty !== itemReq.qty) {
                             finalItemsText += `${approvedQty}x ${itemReq.name} (Pidió ${itemReq.qty}), `;
                         } else {
                             finalItemsText += `${approvedQty}x ${itemReq.name}, `;
                         }
                     }
                 }
            }

            if (finalItemsText === "") return;
            
            localStorage.setItem('sicp_stock_data', JSON.stringify(INVENTORY));
            PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
            localStorage.setItem('sicp_pending_requests', JSON.stringify(PENDING_REQUESTS));
            
            submitToGoogleForms(request.leaderName, finalItemsText, `PROCESADA (${currentAdminSession})`);
            render(); 
            
            if (EXCEL_API_URL) {
                try {
                    await Promise.all(updates.map(u => fetch(`${EXCEL_API_URL}?action=update&id=${u.id}&stock=${u.stock}&t=${new Date().getTime()}`, { redirect: 'follow' })));
                    await fetch(`${EXCEL_API_URL}?action=remove_pending&reqId=${reqId}&t=${new Date().getTime()}`, { redirect: 'follow' });
                } catch(e) {}
            }
        }
        
        function rejectRequest(reqId) {
            if (confirm("¿Rechazar pedido?")) {
                const request = PENDING_REQUESTS.find(r => r.id === reqId);
                let originalItemsText = request.items.map(i => `${i.qty}x ${i.name}`).join(', ');
                submitToGoogleForms(request.leaderName, originalItemsText, `RECHAZADA (${currentAdminSession})`);
                PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
                localStorage.setItem('sicp_pending_requests', JSON.stringify(PENDING_REQUESTS));
                render();
                if (EXCEL_API_URL) fetch(`${EXCEL_API_URL}?action=remove_pending&reqId=${reqId}&t=${new Date().getTime()}`, { redirect: 'follow' }).catch(e=>e);
            }
        }

        function updateCart(id, change) {
            const item = INVENTORY.find(i => i.id === id);
            const currentQty = cart[id] || 0;
            const newQty = currentQty + change;
            if (newQty > item.stock) return;
            cart[id] = newQty;
            if (cart[id] <= 0) delete cart[id];
            render();
        }

        function getTotalItems() { return Object.values(cart).reduce((a, b) => a + b, 0); }
        function goToCheckout() { stopBackgroundSync(); currentView = 'checkout'; render(); window.scrollTo(0, 0); }
        function goToCatalog() { stopBackgroundSync(); currentView = 'catalog'; loadData(); window.scrollTo(0, 0); }
        
        function goToAdmin() { 
            if(currentAdminSession) { currentView = 'admin'; loadData().then(() => startBackgroundSync()); } 
            else { currentView = 'login_admin'; }
            render(); window.scrollTo(0, 0); 
        }

        function exitAdmin() {
            stopBackgroundSync(); currentAdminSession = ""; goToCatalog(); showToast(t('sessionClosed'), "info");
        }

        function verifyAdminPin(event) {
            event.preventDefault();
            const pin = document.getElementById('adminPinInput').value;
            if (ADMIN_USERS[pin]) {
                currentAdminSession = ADMIN_USERS[pin]; 
                currentView = 'admin';
                loadData().then(() => startBackgroundSync()); 
                render();
                showToast(`${t('welcome')}, ${currentAdminSession}`, "success");
            } else {
                showToast(t('errorPin'), "error");
                document.getElementById('adminPinInput').value = ''; 
                document.getElementById('adminPinInput').focus();    
            }
        }

        function submitToGoogleForms(name, itemsText, statusText) {
            if(GOOGLE_FORM_URL.includes("TU_ID_DE_FORMULARIO_AQUI")) return;
            let iframe = document.getElementById('hidden_iframe');
            if (!iframe) {
                iframe = document.createElement('iframe'); iframe.name = 'hidden_iframe'; iframe.id = 'hidden_iframe'; iframe.style.display = 'none';
                document.body.appendChild(iframe);
            }
            let form = document.createElement('form'); form.action = GOOGLE_FORM_URL; form.method = 'POST'; form.target = 'hidden_iframe';
            let finalName = name;
            if (statusText) {
                if (ENTRY_STATUS && ENTRY_STATUS !== "entry.000000000") {
                    let inputStatus = document.createElement('input'); inputStatus.type = 'hidden'; inputStatus.name = ENTRY_STATUS; inputStatus.value = statusText; form.appendChild(inputStatus);
                } else { finalName = `${name} [${statusText}]`; }
            }
            let inputName = document.createElement('input'); inputName.type = 'hidden'; inputName.name = ENTRY_NAME; inputName.value = finalName; form.appendChild(inputName);
            let inputItems = document.createElement('input'); inputItems.type = 'hidden'; inputItems.name = ENTRY_ITEMS; inputItems.value = itemsText; form.appendChild(inputItems);
            document.body.appendChild(form); form.submit();
        }

        function processOrder(event) {
            event.preventDefault();
            const nameSelect = document.getElementById('leaderName');
            const name = nameSelect.value;
            if (!name) return;

            let messageWA = t('whatsappMsg').replace('{name}', name.trim());
            let reqItems = [];

            for (const [id, qty] of Object.entries(cart)) {
                const item = INVENTORY.find(i => i.id === id);
                const dispName = ITEM_DICT[item.name]?.[currentLang] || item.name;
                messageWA += `▪️ ${qty}x ${dispName}%0A`;
                // Original name goes to DB
                reqItems.push({ id: item.id, name: item.name, qty: qty });
            }

            messageWA += t('whatsappOutro');
            
            const newRequest = { id: 'req_' + Date.now(), leaderName: name.trim(), items: reqItems, date: new Date().toLocaleString() };

            if (EXCEL_API_URL) {
                const itemsStr = encodeURIComponent(JSON.stringify(reqItems));
                fetch(`${EXCEL_API_URL}?action=add_pending&reqId=${newRequest.id}&leader=${encodeURIComponent(newRequest.leaderName)}&items=${itemsStr}&date=${encodeURIComponent(newRequest.date)}&t=${new Date().getTime()}`, { redirect: 'follow' }).catch(e=>e);
            }

            PENDING_REQUESTS.push(newRequest);
            localStorage.setItem('sicp_pending_requests', JSON.stringify(PENDING_REQUESTS));
            window.open(`https://api.whatsapp.com/send?text=${messageWA}`, '_blank');
            
            cart = {};
            currentView = 'success';
            render();
            window.scrollTo(0, 0);
        }

                            <i data-lucide="check-circle" style="width: 64px; height: 64px;"></i>
                        </div>
                    </div>
                    <h2 class="text-3xl font-bold text-slate-800 dark:text-white mb-4">${t('successTitle')}</h2>
                    <p class="text-slate-600 dark:text-slate-300 mb-8 text-lg">
                        ${t('successMsg1')}
                    </p>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">${t('successMsg2')}</p>
                    <button onclick="goToCatalog()" class="w-full py-3 rounded-lg bg-slate-100 dark:bg-slate-900 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 font-medium transition-all border border-slate-200 dark:border-slate-800">
                        ${t('backStart')}
                    </button>
                </div>`;
            }

            container.innerHTML = html;
            updateThemeUI(); // Asegura que los íconos se rendericen y tengan la forma correcta
        }

        // Iniciar
        loadData();
    </script>
