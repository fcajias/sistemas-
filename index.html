            if (isDark) { document.documentElement.classList.add('dark'); if(icon) icon.setAttribute('data-lucide', 'sun'); } 
            else { document.documentElement.classList.remove('dark'); if(icon) icon.setAttribute('data-lucide', 'moon'); }

            if(window.lucide) window.lucide.createIcons();
        }

        window.formatPDate = function(dateStr) {
            if(!dateStr) return '';
            let s = String(dateStr);
            let d = new Date(s);
            if (!isNaN(d.getTime())) return d.toLocaleDateString('es-EC');
            let cleanStr = s.split('GMT')[0].trim();
            let d2 = new Date(cleanStr);
            if (!isNaN(d2.getTime())) return d2.toLocaleDateString('es-EC');
            return cleanStr.substring(0, 15);
        };

            try {
                const res = await fetch(`${EXCEL_API_URL}?action=read_all&t=${new Date().getTime()}`, { redirect: 'follow' });
                if (!res.ok) throw new Error('Error en servidor');
                const data = await res.json(); 
                if (data.inventory) {
                    window.INVENTORY.forEach(item => {
                        if (data.inventory[item.id] !== undefined) {
                            item.stock = parseInt(data.inventory[item.id].stock);
                            item.lastModBy = data.inventory[item.id].lastModifiedBy || "-";
                            item.lastModDate = data.inventory[item.id].lastModifiedDate || "-";
                        }
                    });
                }
                if (data.pending) window.PENDING_REQUESTS = data.pending;
                if (data.purchases) window.PURCHASES = data.purchases; 
                if (data.audit && data.audit.length > 0) { window.AUDIT_LOG = data.audit; localStorage.setItem('sicp_audit_log', JSON.stringify(window.AUDIT_LOG)); }

        let backgroundSyncTimer = null;
        window.startBackgroundSync = function() {
            if (backgroundSyncTimer) clearInterval(backgroundSyncTimer);
            backgroundSyncTimer = setInterval(async () => {
                if (window.currentView !== 'admin' || !EXCEL_API_URL || window.isProcessing) return; 
                try {
                    const res = await fetch(`${EXCEL_API_URL}?action=read_all&t=${new Date().getTime()}`, { redirect: 'follow' });
                    if (!res.ok) return;
                    const data = await res.json(); 
                    let hasChanges = false;
                    if (data.pending && JSON.stringify(window.PENDING_REQUESTS) !== JSON.stringify(data.pending)) { window.PENDING_REQUESTS = data.pending; hasChanges = true; }
                    if (data.purchases && JSON.stringify(window.PURCHASES) !== JSON.stringify(data.purchases)) { window.PURCHASES = data.purchases; hasChanges = true; }
                    if (data.inventory) {
                        window.INVENTORY.forEach(item => {
                            if (data.inventory[item.id] !== undefined) {
                                const newData = data.inventory[item.id];
                                if (item.stock !== parseInt(newData.stock) || item.lastModDate !== newData.lastModifiedDate) { 
                                    item.stock = parseInt(newData.stock); item.lastModBy = newData.lastModifiedBy; item.lastModDate = newData.lastModifiedDate; hasChanges = true; 
                                }
                            }
                        });
                    }
                    if (data.audit && JSON.stringify(window.AUDIT_LOG) !== JSON.stringify(data.audit)) { window.AUDIT_LOG = data.audit; hasChanges = true; }
                    if (hasChanges && document.activeElement.tagName !== 'INPUT') window.render();
                } catch(e) {}
            }, 10000); 
        }

        // --- SOLICITUDES Y DOTACIONES ---
        window.processRequest = async function(reqId) {
            if (!window.currentAdminSession) { window.goToAdmin(); return; }
            const request = window.PENDING_REQUESTS.find(r => r.id === reqId);
            if (!request) return;
            window.isProcessing = true; 
            try {
                let updates = []; let finalItemsText = ""; const nowStr = new Date().toLocaleTimeString();
                for (let index = 0; index < request.items.length; index++) {
                     const itemReq = request.items[index];
                     const inputEl = document.getElementById(`edit_qty_${reqId}_${index}`);
                     const approvedQty = inputEl ? parseInt(inputEl.value) || 0 : 0;
                     if (approvedQty > 0) {
                         const invItem = window.INVENTORY.find(i => i.id === itemReq.id);
                         if (invItem) {
                             if (approvedQty > invItem.stock) { window.showToast(`Stock insuficiente de ${itemReq.name}`, "error"); return; }
                             invItem.stock = Math.max(0, invItem.stock - approvedQty);
                             invItem.lastModBy = window.currentAdminSession; invItem.lastModDate = nowStr;
                             updates.push({id: invItem.id, stock: invItem.stock, user: window.currentAdminSession, date: nowStr});
                             window.logAuditAction('Despacho', itemReq.name, -approvedQty);
                             finalItemsText += approvedQty !== itemReq.qty ? `${approvedQty}x ${itemReq.name} (Pidió ${itemReq.qty}), ` : `${approvedQty}x ${itemReq.name}, `;
                         }
                     }
                }
                if (finalItemsText === "") return;
                window.PENDING_REQUESTS = window.PENDING_REQUESTS.filter(r => r.id !== reqId);
                window.submitToGoogleForms(request.leaderName, finalItemsText, `PROCESADA (${window.currentAdminSession})`);
                window.render(); window.showToast("⏳ Despachando y actualizando nube...", "info");
                if (EXCEL_API_URL) {
                    await Promise.all(updates.map(u => fetch(`${EXCEL_API_URL}?action=update&id=${encodeURIComponent(u.id)}&stock=${u.stock}&user=${encodeURIComponent(u.user)}&date=${encodeURIComponent(u.date)}&t=${new Date().getTime()}`, { redirect: 'follow' })));
                    await fetch(`${EXCEL_API_URL}?action=remove_pending&reqId=${encodeURIComponent(reqId)}&t=${new Date().getTime()}`, { redirect: 'follow' });
                    window.showToast("✅ Despacho finalizado con éxito.", "success");
                }
            } catch(e) { window.showToast("❌ Error al procesar solicitud.", "error"); } finally { window.isProcessing = false; }
        }

            window.cart[id] = newQty;
            if (window.cart[id] <= 0) delete window.cart[id];

                        </div>
                    </div>
                </div>
                `;
            }

            if (window.isApproveQuoteModalOpen && window.quoteToApprove) {
                html += `
                <div class="fixed inset-0 glass-panel z-[80] flex items-center justify-center p-4 animate-fade-in-up no-print">
                    <div class="bg-slate-900 border border-emerald-500/30 w-full max-w-lg rounded-[2rem] shadow-2xl shadow-emerald-500/10 overflow-hidden flex flex-col relative">
                        <div class="absolute -top-24 -right-24 w-48 h-48 bg-emerald-500/20 rounded-full blur-3xl"></div>
                        <div class="p-8 relative z-10 flex flex-col h-full max-h-[90vh]">
                            <div class="w-16 h-16 bg-emerald-900/50 border border-emerald-500/50 text-emerald-400 rounded-2xl flex items-center justify-center mb-6 mx-auto flex-shrink-0">
                                <i data-lucide="badge-dollar-sign" class="w-8 h-8"></i>
                            </div>
                            <h3 class="font-black text-2xl text-white text-center mb-1">Fijar Precios Finales</h3>
                            <p class="text-slate-400 text-sm text-center mb-6">Proveedor: <span class="text-emerald-400 font-bold">${window.quoteToApprove.provider}</span></p>
                            
                            <form onsubmit="window.confirmQuotePurchase(event)" class="flex flex-col flex-grow overflow-hidden">
                                <div class="overflow-y-auto pr-2 space-y-3 mb-6 flex-grow">
                                    ${window.quoteToApprove.items.map((item, idx) => `
                                        <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700">
                                            <div class="text-left flex-grow mr-4">
                                                <p class="text-sm font-bold text-white truncate">${ITEM_DICT[item.name]?.[window.currentLang] || item.name}</p>
                                                <p class="text-xs text-emerald-400 font-medium">Cantidad: ${item.qty} uds</p>
                                            </div>
                                            <div class="w-1/2 max-w-[140px]">
                                                <label class="block text-[10px] text-slate-400 uppercase font-bold mb-1 tracking-wider">Precio Unitario ($)</label>
                                                <input type="number" id="quotePrice_${idx}" required min="0.01" step="0.01" placeholder="Ej: 15.50" class="w-full bg-slate-900 border border-slate-600 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white rounded-lg py-2 px-3 outline-none text-right font-mono transition-all">
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div class="flex gap-3 mt-auto pt-4 border-t border-slate-800 flex-shrink-0">
                                    <button type="button" onclick="window.closeApproveQuote()" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold transition-colors border border-slate-700">Cancelar</button>
                                    <button type="submit" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-black shadow-lg shadow-emerald-600/30 transition-transform transform hover:-translate-y-1">Confirmar Precios</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                `;
            }

            if (window.isSmartOrderModalOpen) {
                html += `
                <div class="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print animate-fade-in-up">
                    <div id="smartOrderPrintable" class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-700">
                        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
                            <h3 class="font-black text-slate-800 dark:text-white flex items-center"><i data-lucide="zap" class="mr-2 text-orange-500"></i> Orden de Compra Sugerida</h3>
                            <button onclick="window.closeSmartOrder()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors modal-close-btn"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <form onsubmit="window.processSmartOrder(event)" class="p-6 space-y-4">
                            <div class="bg-orange-50 dark:bg-orange-900/20 p-4 rounded-xl border border-orange-200 dark:border-orange-800/50 mb-4">
                                <p class="text-sm font-medium text-orange-800 dark:text-orange-300 mb-3">El sistema sugiere pedir las siguientes cantidades. Asigna el Precio Unitario a cada uno:</p>
                                <div class="space-y-3 max-h-60 overflow-y-auto pr-2">
                                    ${window.smartOrderItems.map((item, idx) => `
                                        <div class="flex items-center justify-between bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                                            <label class="flex items-center space-x-3 cursor-pointer w-1/3">
                                                <input type="checkbox" ${item.selected ? 'checked' : ''} onchange="window.toggleSmartItem(${idx})" class="w-4 h-4 text-orange-500 rounded border-slate-300">
                                                <span class="font-bold text-slate-700 dark:text-slate-200 text-sm truncate">${ITEM_DICT[item.name]?.[window.currentLang] || item.name}</span>
                                            </label>
                                            <div class="flex items-center space-x-3">
                                                <div class="flex flex-col text-right">
                                                    <span class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider mb-1">Precio Unit. ($)</span>
                                                    <input type="number" id="smartPrice_${idx}" min="0.01" step="0.01" placeholder="0.00" class="w-20 sm:w-24 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white rounded px-2 py-1 text-right font-mono outline-none text-sm ${item.selected ? '' : 'opacity-50 cursor-not-allowed'}" ${item.selected ? 'required' : 'disabled'}>
                                                </div>
                                                <div class="flex flex-col text-right">
                                                    <span class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider mb-1">Cant.</span>
                                                    <input type="number" value="${item.qty}" min="1" onchange="window.updateSmartQty(${idx}, this.value)" class="w-16 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white rounded px-2 py-1 text-center font-bold outline-none text-sm ${item.selected ? '' : 'opacity-50 cursor-not-allowed'}" ${item.selected ? '' : 'disabled'}>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Proveedor (Para registro)</label>
                                <input type="text" id="smartProv" required placeholder="Ej. Sistec" class="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white rounded-lg px-3 py-2 outline-none">
                            </div>
                            <div class="pt-4 flex flex-col sm:flex-row gap-3">
                                <button type="button" onclick="window.sendSmartOrderWhatsApp()" class="flex-1 py-3 bg-[#25D366] hover:bg-[#1ebd5c] text-white rounded-xl font-black shadow-md flex items-center justify-center transition-colors">
                                    <i data-lucide="message-circle" class="w-5 h-5 mr-2"></i> WhatsApp
                                </button>
                                <button type="submit" class="flex-1 py-3 bg-orange-500 hover:bg-orange-600 text-white rounded-xl font-black shadow-md flex items-center justify-center transition-colors">
                                    <i data-lucide="save" class="w-5 h-5 mr-2"></i> Registrar Directamente
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                `;
            }

            if (window.isEditPurchaseModalOpen) {
                html += `
                <div class="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print animate-fade-in-up">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-700">
                        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
                            <h3 class="font-black text-slate-800 dark:text-white flex items-center"><i data-lucide="edit" class="mr-2 text-blue-500"></i> Editar Compra</h3>
                            <button onclick="window.closeEditPurchase()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <form onsubmit="window.saveEditPurchase(event)" class="p-6 space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Producto</label>
                                <input type="text" value="${ITEM_DICT[window.editPurchData.product]?.[window.currentLang] || window.editPurchData.product}" disabled class="w-full border border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-700 text-slate-500 rounded-lg px-3 py-2 outline-none font-bold">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Cantidad</label>
                                    <input type="number" required min="1" value="${window.editPurchData.qty}" onchange="window.editPurchData.qty=this.value" class="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white rounded-lg px-3 py-2 outline-none text-center">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Costo ($)</label>
                                    <input type="number" required min="0" step="0.01" value="${window.editPurchData.cost}" onchange="window.editPurchData.cost=this.value" class="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white rounded-lg px-3 py-2 outline-none text-center">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Proveedor</label>
                                <input type="text" required value="${window.editPurchData.provider}" onchange="window.editPurchData.provider=this.value" class="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-white rounded-lg px-3 py-2 outline-none">
                            </div>
                            <div class="pt-4 flex gap-3">
                                <button type="button" onclick="window.closeEditPurchase()" class="flex-1 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-xl font-black transition-colors">Cancelar</button>
                                <button type="submit" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-black shadow-md transition-colors">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
                `;
            }

            if (window.isKitModalOpen) {
                html += `
                <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print animate-fade-in-up">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-700">
                        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
                            <h3 class="font-black text-slate-800 dark:text-white flex items-center"><i data-lucide="user-plus" class="mr-2 text-indigo-500"></i> ${t('newHireTitle')}</h3>
                            <button onclick="window.closeKitModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <form onsubmit="window.processNewHireKit(event)" class="p-6 space-y-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">${t('newHireNameLabel')}</label>
                                <input type="text" id="kitEmpName" required placeholder="Ej. Juan Pérez" class="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            
                            <div class="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-xl border border-indigo-100 dark:border-indigo-800/50">
                                <h4 class="text-xs font-black text-indigo-800 dark:text-indigo-300 uppercase tracking-wider mb-3">${t('newHireStandard')}</h4>
                                <div class="grid grid-cols-3 gap-2">
                                    <label class="flex items-center space-x-2 text-sm font-medium text-slate-700 dark:text-slate-300"><input type="checkbox" id="kitMouse" checked class="w-4 h-4 rounded text-indigo-600 border-slate-300"> <span>Mouse</span></label>
                                    <label class="flex items-center space-x-2 text-sm font-medium text-slate-700 dark:text-slate-300"><input type="checkbox" id="kitCharger" checked class="w-4 h-4 rounded text-indigo-600 border-slate-300"> <span>Cargador</span></label>
                                    <label class="flex items-center space-x-2 text-sm font-medium text-slate-700 dark:text-slate-300"><input type="checkbox" id="kitNetCable" checked class="w-4 h-4 rounded text-indigo-600 border-slate-300"> <span>Cable Red</span></label>
                                </div>
                            </div>

                            <div class="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <h4 class="text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">${t('newHireOptional')}</h4>
                                <div class="space-y-3">
                                    <label class="flex items-center space-x-3 text-sm font-bold text-slate-700 dark:text-slate-300 p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg cursor-pointer">
                                        <input type="checkbox" id="kitHeadphonesSimple" class="w-4 h-4 rounded text-indigo-600 border-slate-300"> <span>Audífonos Simples (1 Entrada)</span>
                                    </label>
                                    <label class="flex items-center space-x-3 text-sm font-bold text-slate-700 dark:text-slate-300 p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg cursor-pointer">
                                        <input type="checkbox" id="kitHeadphonesDouble" class="w-4 h-4 rounded text-indigo-600 border-slate-300"> <span>Audífonos Dobles (2 Entradas)</span>
                                    </label>
                                    <label class="flex items-center space-x-3 text-sm font-bold text-slate-700 dark:text-slate-300 p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg cursor-pointer">
                                        <input type="checkbox" id="kitKeyboard" class="w-4 h-4 rounded text-indigo-600 border-slate-300"> <span>${t('newHireKeyboard')}</span>
                                    </label>
                                </div>
                            </div>

                            <div class="pt-2">
                                <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-black shadow-md flex items-center justify-center transition-colors">
                                    <i data-lucide="package-check" class="w-5 h-5 mr-2"></i> ${t('registerKit')}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                `;
            }

            // MODAL GLOBAL DE CONFIRMACIÓN
            if (window.confirmConfig.isOpen) {
                html += `
                <div class="fixed inset-0 bg-slate-900/80 z-[90] flex items-center justify-center p-4 backdrop-blur-sm no-print animate-fade-in-up">
                    <div class="bg-white dark:bg-slate-800 rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-700 text-center p-8">
                        <div class="mx-auto bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-full text-indigo-500 mb-6">
                            <i data-lucide="help-circle" class="w-10 h-10"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-800 dark:text-white mb-2">Confirmar Acción</h3>
                        <p class="text-slate-600 dark:text-slate-300 text-sm mb-8 font-medium">${window.confirmConfig.message}</p>
                        <div class="flex gap-3">
                            <button onclick="window.closeConfirm()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 rounded-xl font-bold transition-colors">Cancelar</button>
                            <button onclick="window.executeConfirm()" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-black shadow-md transition-colors">Sí, Continuar</button>
                        </div>
                    </div>
                </div>
                `;
            }

            document.getElementById('app-container').innerHTML = html;
            if(window.lucide) window.lucide.createIcons(); 
        }

        window.loadData();
    </script>
</body>
</html>
