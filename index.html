            setTimeout(() => toast.classList.add('translate-x-[150%]'), 4000);

        async function loadData() {
            if (!EXCEL_API_URL) return;
            isSyncing = true;
            render();
            try {
                const res = await fetch(`${EXCEL_API_URL}?action=read_all&t=${new Date().getTime()}`, { redirect: 'follow' });
                if (!res.ok) throw new Error('Error en servidor');
                const data = await res.json(); 
                
                if (data.inventory) {
                    INVENTORY.forEach(item => {
                        if (data.inventory[item.id] !== undefined) {
                            item.stock = parseInt(data.inventory[item.id].stock);
                            item.lastModBy = data.inventory[item.id].lastModifiedBy || "-";
                            item.lastModDate = data.inventory[item.id].lastModifiedDate || "-";
                        }
                    });
                }
                if (data.pending) PENDING_REQUESTS = data.pending;
            } catch(e) {} finally {
                isSyncing = false;
                render();
            }
        }

        function startBackgroundSync() {
            if (backgroundSyncTimer) clearInterval(backgroundSyncTimer);
            backgroundSyncTimer = setInterval(async () => {
                if (currentView !== 'admin' || !EXCEL_API_URL) return;
                try {
                    const res = await fetch(`${EXCEL_API_URL}?action=read_all&t=${new Date().getTime()}`, { redirect: 'follow' });
                    if (!res.ok) return;
                    const data = await res.json(); 
                    let hasChanges = false;
                    
                    if (data.pending && JSON.stringify(PENDING_REQUESTS) !== JSON.stringify(data.pending)) {
                        PENDING_REQUESTS = data.pending; hasChanges = true;
                    }
                    if (data.inventory) {
                        INVENTORY.forEach(item => {
                            if (data.inventory[item.id] !== undefined) {
                                const newData = data.inventory[item.id];
                                if (item.stock !== parseInt(newData.stock) || item.lastModDate !== newData.lastModifiedDate) { 
                                    item.stock = parseInt(newData.stock); item.lastModBy = newData.lastModifiedBy; item.lastModDate = newData.lastModifiedDate; hasChanges = true; 
                                }
                            }
                        });
                    }
                    if (hasChanges && document.activeElement.tagName !== 'INPUT') render();
                } catch(e) {}
            }, 10000); 
        }
        function stopBackgroundSync() { if (backgroundSyncTimer) { clearInterval(backgroundSyncTimer); backgroundSyncTimer = null; } }

            item.stock = parseInt(newStock) || 0;
            item.lastModBy = currentAdminSession;
            item.lastModDate = new Date().toLocaleTimeString();
            
            const diff = item.stock - oldStock;
            if(diff !== 0) {
                logAuditAction('Ajuste Manual', item.name, diff);
            }

            render(); 

            if (!EXCEL_API_URL) return;
            try {
                await fetch(`${EXCEL_API_URL}?action=update&id=${id}&stock=${item.stock}&user=${encodeURIComponent(currentAdminSession)}&date=${encodeURIComponent(item.lastModDate)}&t=${new Date().getTime()}`, { redirect: 'follow' });
            } catch(e) { showToast(`Error API`, 'error'); }
        }

        async function processRequest(reqId) {
            if (!currentAdminSession) { goToAdmin(); return; }
            const request = PENDING_REQUESTS.find(r => r.id === reqId);
            if (!request) return;
            
            let updates = [];
            let finalItemsText = "";
            const nowStr = new Date().toLocaleTimeString();
            
            for (let index = 0; index < request.items.length; index++) {
                 const itemReq = request.items[index];
                 const inputEl = document.getElementById(`edit_qty_${reqId}_${index}`);
                 const approvedQty = inputEl ? parseInt(inputEl.value) || 0 : 0;

                 if (approvedQty > 0) {
                     const invItem = INVENTORY.find(i => i.id === itemReq.id);
                     if (invItem) {
                         if (approvedQty > invItem.stock) { alert(`Stock insuficiente`); return; }
                         invItem.stock = Math.max(0, invItem.stock - approvedQty);
                         invItem.lastModBy = currentAdminSession;
                         invItem.lastModDate = nowStr;
                         updates.push({id: invItem.id, stock: invItem.stock, user: currentAdminSession, date: nowStr});
                         
                         logAuditAction('Despacho', itemReq.name, -approvedQty);
                         logConsumption(itemReq.name, approvedQty);

                         finalItemsText += approvedQty !== itemReq.qty ? `${approvedQty}x ${itemReq.name} (Pidió ${itemReq.qty}), ` : `${approvedQty}x ${itemReq.name}, `;
                     }
                 }
            }
            if (finalItemsText === "") return;
            PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
            submitToGoogleForms(request.leaderName, finalItemsText, `PROCESADA (${currentAdminSession})`);
            render(); 
            
            if (EXCEL_API_URL) {
                try {
                    await Promise.all(updates.map(u => fetch(`${EXCEL_API_URL}?action=update&id=${u.id}&stock=${u.stock}&user=${encodeURIComponent(u.user)}&date=${encodeURIComponent(u.date)}&t=${new Date().getTime()}`, { redirect: 'follow' })));
                    await fetch(`${EXCEL_API_URL}?action=remove_pending&reqId=${reqId}&t=${new Date().getTime()}`, { redirect: 'follow' });
                } catch(e) {}
            }
        }
        
        function rejectRequest(reqId) {
            if (confirm("¿Rechazar pedido?")) {
                const request = PENDING_REQUESTS.find(r => r.id === reqId);
                let originalItemsText = request.items.map(i => `${i.qty}x ${i.name}`).join(', ');
                
                logAuditAction('Rechazo', 'Solicitud Cancelada', 0);
                
                submitToGoogleForms(request.leaderName, originalItemsText, `RECHAZADA (${currentAdminSession})`);
                PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
                render();
                if (EXCEL_API_URL) fetch(`${EXCEL_API_URL}?action=remove_pending&reqId=${reqId}&t=${new Date().getTime()}`, { redirect: 'follow' }).catch(e=>e);
            }
        }

        function updateCart(id, change) {
            const item = INVENTORY.find(i => i.id === id);
            const newQty = (cart[id] || 0) + change;
            if (newQty > item.stock) return;
            cart[id] = newQty;
            if (cart[id] <= 0) delete cart[id];
            render();
        }

        function goToCatalog() { stopBackgroundSync(); currentView = 'catalog'; loadData(); window.scrollTo(0, 0); }
        
        function goToAdmin() { 
            if(currentAdminSession) { currentView = 'admin'; loadData().then(() => startBackgroundSync()); }

        function submitToGoogleForms(name, itemsText, statusText) {
            if(GOOGLE_FORM_URL.includes("TU_ID_DE_FORMULARIO_AQUI")) return;
            let iframe = document.getElementById('hidden_iframe');
            if (!iframe) { iframe = document.createElement('iframe'); iframe.name = 'hidden_iframe'; iframe.id = 'hidden_iframe'; iframe.style.display = 'none'; document.body.appendChild(iframe); }
            let form = document.createElement('form'); form.action = GOOGLE_FORM_URL; form.method = 'POST'; form.target = 'hidden_iframe';
            let finalName = statusText ? `${name} [${statusText}]` : name;
            let inputName = document.createElement('input'); inputName.type = 'hidden'; inputName.name = ENTRY_NAME; inputName.value = finalName; form.appendChild(inputName);
            let inputItems = document.createElement('input'); inputItems.type = 'hidden'; inputItems.name = ENTRY_ITEMS; inputItems.value = itemsText; form.appendChild(inputItems);
            document.body.appendChild(form); form.submit();
        }

            event.preventDefault();

            let messageWA = t('whatsappMsg').replace('{name}', name.trim());
            let reqItems = [];
            
            for (const [id, qty] of Object.entries(cart)) {

                messageWA += `▪️ ${qty}x ${dispName}\n`;
                reqItems.push({ id: item.id, name: item.name, qty: qty });
            }
            
            messageWA += t('whatsappOutro');

            const newRequest = { id: 'req_' + Date.now(), leaderName: name.trim(), items: reqItems, date: new Date().toLocaleString() };

            if (EXCEL_API_URL) {
                fetch(`${EXCEL_API_URL}?action=add_pending&reqId=${newRequest.id}&leader=${encodeURIComponent(newRequest.leaderName)}&items=${encodeURIComponent(JSON.stringify(reqItems))}&date=${encodeURIComponent(newRequest.date)}&t=${new Date().getTime()}`, { redirect: 'follow' }).catch(e=>e);

                                <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2 flex overflow-hidden shadow-inner">
                                    <div class="bg-emerald-500 h-2 progress-bar" style="width: ${((INVENTORY.length - itemsInAlert.length) / INVENTORY.length) * 100}%"></div>
                                    <div class="bg-orange-500 h-2 progress-bar" style="width: ${(INVENTORY.filter(i => i.stock > 0 && i.stock <= i.minStock).length / INVENTORY.length) * 100}%"></div>
                                    <div class="bg-red-500 h-2 progress-bar" style="width: ${(INVENTORY.filter(i => i.stock === 0).length / INVENTORY.length) * 100}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- AUDITORÍA COMPLETA (TRAZABILIDAD) -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden mb-8">
                        <div class="p-6 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50">
                            <h3 class="text-lg font-bold text-slate-800 dark:text-white flex items-center"><i data-lucide="history" class="w-5 h-5 mr-2 text-indigo-500"></i> ${t('auditTitle')}</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Registro inmutable de movimientos, IPs y responsables técnicos.</p>
                        </div>
                        <div class="overflow-x-auto max-h-[500px]">
                            <table class="w-full text-left text-sm whitespace-nowrap">
                                <thead class="bg-slate-100 dark:bg-slate-900/80 text-xs text-slate-500 dark:text-slate-400 uppercase font-bold sticky top-0 shadow-sm z-10">
                                    <tr>
                                        <th class="p-4 border-b dark:border-slate-700">${t('modDate')}</th>
                                        <th class="p-4 border-b dark:border-slate-700">Usuario (Técnico)</th>
                                        <th class="p-4 border-b dark:border-slate-700">${t('action')}</th>
                                        <th class="p-4 border-b dark:border-slate-700">${t('product')}</th>
                                        <th class="p-4 text-center border-b dark:border-slate-700">${t('qty')}</th>
                                        <th class="p-4 text-right border-b dark:border-slate-700">IP Origen</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
                                    ${AUDIT_LOG.map((log, i) => {
                                        const isOut = log.qty.toString().includes('-');
                                        const ip = log.user === 'David Cajias' ? '192.168.1.22' : log.user === 'Joel Congache' ? '192.168.1.18' : '192.168.1.10';
                                        return `
                                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                                            <td class="p-4 font-mono text-xs text-slate-500 dark:text-slate-400">${log.date}</td>
                                            <td class="p-4 font-bold ${log.user === 'Joel Congache' ? 'text-purple-600 dark:text-purple-400' : 'text-blue-600 dark:text-blue-400'}">${log.user}</td>
                                            <td class="p-4 font-medium text-slate-700 dark:text-slate-300">
                                                <span class="px-2 py-1 rounded-md text-[10px] uppercase font-black tracking-wider ${isOut ? 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400' : 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/40 dark:text-emerald-400'}">${log.action}</span>
                                            </td>
                                            <td class="p-4 font-medium text-slate-800 dark:text-slate-200">${log.product}</td>
                                            <td class="p-4 text-center font-black text-lg ${isOut ? 'text-red-500 dark:text-red-400' : 'text-emerald-500 dark:text-emerald-400'}">${log.qty}</td>
                                            <td class="p-4 text-right font-mono text-xs text-slate-400 dark:text-slate-500">${ip}</td>
                                        </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    `;
                } 
                else {
                    // VISTA TÉCNICOS (Solo solicitudes de momento para evitar huecos en Grid de 2 col)
                    html += `
                        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col mb-8">
                            <div class="bg-indigo-600 dark:bg-indigo-500 px-6 py-5 text-white">
                                <h2 class="text-xl font-black flex items-center"><i data-lucide="inbox" class="mr-2"></i> ${t('pendingTitle')}</h2>
                            </div>
                            <div class="p-6 flex-grow bg-slate-50 dark:bg-slate-900/50">
                    `;
                    
                    if (PENDING_REQUESTS.length === 0) {
                        html += `<div class="text-center py-10"><i data-lucide="check-circle-2" class="w-16 h-16 text-slate-300 dark:text-slate-600 mx-auto mb-4"></i><p class="text-slate-500 dark:text-slate-400 font-medium">${t('noPending')}</p></div>`;
                    } else {
                        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`; // Mejoramos la lista de solicitudes a grid interno
                        PENDING_REQUESTS.forEach(req => {
                            let itemsHtml = req.items.map((i, index) => `
                                <li class="flex items-center justify-between text-sm mb-2 last:mb-0">
                                    <span class="text-slate-700 dark:text-slate-300 font-medium">${i.name} <span class="text-xs text-slate-400 block sm:inline">(Pidió ${i.qty})</span></span>
                                    <input type="number" id="edit_qty_${req.id}_${index}" min="0" max="${i.qty}" value="${i.qty}" class="w-12 text-center py-1 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded font-bold text-sm focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 outline-none">
                                </li>`).join('');
                            html += `
                                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm animate-fade-in-up flex flex-col justify-between">
                                    <div class="mb-3"><h4 class="font-bold text-slate-800 dark:text-white">${req.leaderName}</h4><p class="text-xs text-slate-500 dark:text-slate-400">${req.date}</p></div>
                                    <ul class="mb-4 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-lg border border-slate-200 dark:border-slate-700 flex-grow">${itemsHtml}</ul>
                                    <div class="flex justify-between items-center border-t border-slate-100 dark:border-slate-700 pt-3">
                                        <button onclick="rejectRequest('${req.id}')" class="px-4 py-2 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg text-sm font-bold hover:bg-red-100 dark:hover:bg-red-900/50 transition-colors">Rechazar</button>
                                        <button onclick="processRequest('${req.id}')" class="px-4 py-2 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg text-sm font-bold flex items-center shadow-md hover:bg-indigo-700 dark:hover:bg-indigo-600 transition-colors"><i data-lucide="check-square" class="w-4 h-4 mr-2"></i> Despachar</button>
                                    </div>
                                </div>`;
                        });
                        html += `</div>`;
                    }
                    html += `</div></div>`; 
                }

                // ==========================================
                // 📦 TABLA DE INVENTARIO (Visible para Todos)
                // ==========================================
                html += `
                        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col">
                            <div class="bg-slate-900 dark:bg-slate-950 px-6 py-5 text-white flex justify-between items-center">
                                <div><h2 class="text-xl font-black flex items-center"><i data-lucide="package-search" class="mr-2 text-emerald-400"></i> ${t('stockTitle')}</h2></div>
                            </div>
                            <div class="p-6 overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 border-b-2 border-slate-100 dark:border-slate-700">
                                        <tr>
                                            <th class="pb-2">${t('product')}</th>
                                            <th class="pb-2 text-center">${t('minStock')}</th>
                                            <th class="pb-2 text-center">${t('units')}</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
                `;

                INVENTORY.forEach(item => {
                    const isZero = item.stock <= 0;
                    const isLowStock = item.stock > 0 && item.stock <= item.minStock;
                    
                    let colorClasses = '';
                    if (isZero) colorClasses = 'border-red-300 dark:border-red-800 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30';
                    else if (isLowStock) colorClasses = 'border-orange-300 dark:border-orange-800 text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/30';
                    else colorClasses = 'border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-800';

                    let readOnlyColorClasses = '';
                    if (isZero) readOnlyColorClasses = 'border-red-200 dark:border-red-900/50 text-red-500 dark:text-red-400 bg-red-50/50 dark:bg-red-900/20';
                    else if (isLowStock) readOnlyColorClasses = 'border-orange-200 dark:border-orange-900/50 text-orange-600 dark:text-orange-400 bg-orange-50/50 dark:bg-orange-900/20';
                    else readOnlyColorClasses = 'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400';

                    const stockInputHtml = isTech 
                        ? `<input type="number" value="${item.stock}" onchange="adminUpdateStock('${item.id}', this.value)" class="w-16 text-center text-sm font-bold border rounded px-1 py-1 focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 outline-none transition-all ${colorClasses}">`
                        : `<div class="w-16 mx-auto text-center text-sm font-bold border rounded px-1 py-1 ${readOnlyColorClasses}">${item.stock}</div>`;

                    const auditHtml = item.lastModBy ? `<span class="block text-[10px] text-slate-400 dark:text-slate-500 font-normal mt-0.5">${t('lastMod')} ${item.lastModBy} (${item.lastModDate})</span>` : '';

                    html += `
                                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                                            <td class="py-3 flex items-center gap-3">
                                                <div class="w-8 h-8 rounded flex items-center justify-center ${item.bg}"><i data-lucide="${item.icon}" class="w-4 h-4 ${item.color}"></i></div>
                                                <div><span class="font-semibold text-slate-700 dark:text-slate-200 text-sm">${ITEM_DICT[item.name]?.[currentLang] || item.name}</span>${auditHtml}</div>
                                            </td>
                                            <td class="py-3 text-center align-middle font-mono text-xs text-slate-400 dark:text-slate-500">${item.minStock}</td>
                                            <td class="py-3 text-center align-middle">${stockInputHtml}</td>
                                        </tr>`;
                });

                html += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                </div>`;
            }
            else if (currentView === 'checkout') {
                floatingCart.style.display = 'none';
                let opcionesLideres = LIDERES.map(lider => `<option value="${lider}">${lider}</option>`).join('');

                html += `
                <div class="max-w-2xl mx-auto space-y-6 animate-fade-in-up pb-10">
                    <button onclick="goToCatalog()" class="flex items-center text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 font-medium mb-4"><i data-lucide="arrow-left" class="w-5 h-5 mr-1"></i> ${t('backCatalog')}</button>
                    <h2 class="text-3xl font-bold text-slate-800 dark:text-white">${t('checkoutTitle')}</h2>
                    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 md:p-8">
                        <form onsubmit="processOrder(event)">
                            <div class="mb-8">
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">${t('leaderName')}</label>
                                <select id="leaderName" required autofocus class="w-full border-2 border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none text-lg transition-all cursor-pointer">
                                    <option value="" disabled selected>${t('selectName')}</option>
                                    ${opcionesLideres}
                                </select>
                            </div>
                            <h3 class="font-bold text-slate-700 dark:text-slate-300 mb-4 border-b-2 border-slate-100 dark:border-slate-700 pb-2">${t('yourOrder')}</h3>
                            <ul class="divide-y divide-slate-100 dark:divide-slate-700 mb-8">
                `;
                
                for (const [id, qty] of Object.entries(cart)) {
                    const item = INVENTORY.find(i => i.id === id);
                    html += `
                        <li class="py-4 flex items-center justify-between">
                            <div class="flex items-center space-x-4"><div class="w-12 h-12 rounded-lg flex items-center justify-center ${item.bg}"><i data-lucide="${item.icon}" class="${item.color}"></i></div><p class="font-bold text-slate-800 dark:text-slate-200 text-lg">${ITEM_DICT[item.name]?.[currentLang] || item.name}</p></div>
                            <span class="font-bold text-indigo-700 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 rounded-lg text-lg border border-indigo-100 dark:border-indigo-800/50">x${qty}</span>
                        </li>`;
                }

                html += `
                            </ul>
                            <button type="submit" class="w-full py-4 text-lg rounded-xl bg-green-600 text-white hover:bg-green-700 shadow-md flex items-center justify-center font-black transition-all"><i data-lucide="send" class="w-6 h-6 mr-2"></i> ${t('sendOrder')}</button>
                            <p class="text-center text-xs text-slate-400 mt-4">${t('checkoutNote')}</p>
                        </form>
                    </div>
                </div>`;
            }
            else if (currentView === 'success') {
                floatingCart.style.display = 'none';
                html += `
                <div class="max-w-md mx-auto mt-20 text-center animate-fade-in-up bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                    <div class="flex justify-center mb-6"><div class="bg-emerald-100 dark:bg-emerald-900/30 p-6 rounded-full text-emerald-600 dark:text-emerald-400"><i data-lucide="check-circle" style="width: 64px; height: 64px;"></i></div></div>
                    <h2 class="text-3xl font-bold text-slate-800 dark:text-white mb-4">${t('successTitle')}</h2>
                    <p class="text-slate-600 dark:text-slate-300 mb-8 text-lg">${t('successMsg1')}</p>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">${t('successMsg2')}</p>
                    <button onclick="goToCatalog()" class="w-full py-3 rounded-lg bg-slate-100 dark:bg-slate-900 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 font-medium transition-all border border-slate-200 dark:border-slate-800">${t('backStart')}</button>
                </div>`;
            }

            container.innerHTML = html;
            updateThemeUI(); 
        }

        loadData();
    </script>
</body>
</html>
