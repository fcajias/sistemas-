<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICP | Solicitudes-Sistemas</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        
        /* Ocultar flechas en inputs numéricos del Admin */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            appearance: none;
            margin: 0; 
        }
        input[type="number"] { 
            -moz-appearance: textfield; 
            appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-24 flex flex-col min-h-screen">
    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed top-20 right-4 sm:right-8 bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-2xl transform transition-all duration-300 translate-x-[150%] z-50 flex items-center gap-3 font-medium border border-slate-700 z-[100]">
        <div id="toast-icon" class="bg-indigo-500/20 p-1.5 rounded-full"><i data-lucide="info" class="text-indigo-400 w-5 h-5"></i></div>
        <span id="toast-msg"></span>
    </div>

    <!-- HEADER -->
    <header class="bg-slate-900 text-white sticky top-0 z-40 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="goToCatalog()">
                <i data-lucide="monitor" class="text-indigo-400"></i>
                <h1 class="font-bold text-xl tracking-tight">SICP <span class="text-indigo-400 font-normal hidden sm:inline">| Solicitudes de Sistemas-Fydi</span></h1>
            </div>
            <!-- Botón de Administrador para controlar el stock -->
            <button onclick="goToAdmin()" class="text-xs font-bold bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded flex items-center gap-2 transition-colors border border-slate-700">
                <i data-lucide="settings" class="w-4 h-4"></i> Admin
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full" id="app-container">
        <!-- El contenido se inyecta aquí con Javascript -->
    </main>

    <!-- FOOTER COPYRIGHT -->
    <footer class="w-full text-center py-6 bg-slate-900 text-white shadow-mt-auto text-sm text-slate-400">
        &copy; 2026 David - DevOps
    </footer>

    <!-- FLOATING CART BUTTON -->
    <div id="floating-cart" class="fixed bottom-6 left-0 right-0 flex justify-center z-50 hidden">
        <button onclick="goToCheckout()" class="bg-indigo-600 text-white hover:bg-indigo-700 shadow-2xl rounded-full px-8 py-4 text-lg font-medium flex items-center transition-all transform hover:scale-105">
            <i data-lucide="shopping-cart" class="mr-3"></i>
            Revisar Pedido (<span id="cart-count">0</span> items)
        </button>
    </div>

    <script>
        // ==========================================
        // 🔗 1. CONEXIÓN CON TU HOJA DE EXCEL (APPS SCRIPT)
        // Sustituye esta URL por la NUEVA que te dio Apps Script en el Paso 2
        // ==========================================
        const EXCEL_API_URL = "https://script.google.com/macros/s/AKfycbz_h3px13ylzRHTLnS_-3VymsP71xeTKRS20pg_otpUHArax3mAiqnTImf2pmyO5Q7-hw/exec"; 

        // ==========================================
        // CONFIGURACIÓN DE GOOGLE FORMS (BASE DE DATOS AUDITORÍA)
        // ==========================================
        const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfFxX65M8NgVPHB09LqC-mIRFi5_owL5G73EszBKKQNZlVVrQ/formResponse";
        const ENTRY_NAME = "entry.519287369"; // ID de la pregunta "Nombre/Área"
        const ENTRY_ITEMS = "entry.747711175"; // ID de la pregunta "Equipos Solicitados"
        const ENTRY_STATUS = "entry.000000000"; // Reemplázalo por tu ID real para que caiga en la Columna D

        // ==========================================
        // 🔒 SEGURIDAD Y PINES PERSONALES
        // ==========================================
        const ADMIN_USERS = {
            "2026": "David Cajias",
            "1234": "Joel Congache" // <-- Cambia el 1234 por el PIN que le des a él
        };
        let currentAdminSession = ""; 

        // ==========================================
        // LISTA DE LÍDERES
        // ==========================================
        const LIDERES = [
            "Anderson Guzman - Líder", "Asdrubal - Líder", "Brandon Castillo - Líder", "Brandon Jacome - Líder",
            "Bryan Briones - G.C.", "Carolina Sangucho - Líder", "Cinthya Pavon - Líder", "Cristian Chiliguano - Líder",
            "David Cajias - DevOps", "Eddy Minga - Líder", "Edgar Jumbo - Líder", "Edinxon Mendoza - Líder",
            "Edumary Gabriela - Líder", "Geoconda Galvez - Aud.", "Gissela Saldana - Líder", "Grace - Líder",
            "Ivy Estupinan - Líder", "Jeimmy Macias - Líder", "Jonathan Ramirez - Líder", "Jordan Trujillo - Líder",
            "Joshep Casarez - Líder","Juan Lopez - Líder", "Kyara - Líder", "Luis Betancour - Aud.", "Magaly - G.C.", "Noenmi - Líder",
            "Rafaela - G.C.", "Rayza - Líder", "Ricardo - Líder", "Roberto Flores - Líder", "Roger Garcia - Líder",
            "Romel Chuchimbe - Líder", "Sabrina - Líder", "Samantha Fonseca - Líder", "Stalin Cabascango - Líder"
        ];

        // ==========================================
        // INVENTARIO BASE 
        // ==========================================
        const DEFAULT_INVENTORY = [
            { id: '1', stock: 10, name: 'Mouse', category: 'Periféricos', icon: 'mouse', color: 'text-blue-500', bg: 'bg-blue-100' },
            { id: '2', stock: 5, name: 'Teclado', category: 'Periféricos', icon: 'keyboard', color: 'text-indigo-500', bg: 'bg-indigo-100' },
            { id: '3', stock: 0, name: 'Audífonos simples', category: 'Audio', icon: 'headphones', color: 'text-emerald-500', bg: 'bg-emerald-100' },
            { id: '4', stock: 20, name: 'Audífonos dobles', category: 'Audio', icon: 'headset', color: 'text-teal-500', bg: 'bg-teal-100' },
            { id: '5', stock: 50, name: 'Cable de Red', category: 'Conectividad', icon: 'network', color: 'text-orange-500', bg: 'bg-orange-100' },
            { id: '6', stock: 15, name: 'Cable de Poder', category: 'Energía', icon: 'plug', color: 'text-red-500', bg: 'bg-red-100' },
            { id: '7', stock: 3, name: 'Cámara', category: 'Video', icon: 'camera', color: 'text-purple-500', bg: 'bg-purple-100' },
            { id: '8', stock: 30, name: 'Cable VGA', category: 'Video', icon: 'cable', color: 'text-cyan-500', bg: 'bg-cyan-100' },
            { id: '9', stock: 10, name: 'Cargador de laptop', category: 'Energía', icon: 'battery-charging', color: 'text-yellow-500', bg: 'bg-yellow-100' },
        ];

        let INVENTORY = [...DEFAULT_INVENTORY];
        let PENDING_REQUESTS = [];
        let cart = {};
        let currentView = 'catalog'; 
        let isSyncing = false;

        const container = document.getElementById('app-container');
        const floatingCart = document.getElementById('floating-cart');
        const cartCountEl = document.getElementById('cart-count');

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const iconContainer = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerHTML = msg;
            
            if(type === 'error') {
                iconContainer.className = 'bg-red-500/20 p-2 rounded-full text-red-500';
                iconContainer.innerHTML = '<i data-lucide="alert-circle" class="w-5 h-5"></i>';
            } else if (type === 'success') {
                iconContainer.className = 'bg-emerald-500/20 p-2 rounded-full text-emerald-500';
                iconContainer.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i>';
            } else {
                iconContainer.className = 'bg-indigo-500/20 p-2 rounded-full text-indigo-400';
                iconContainer.innerHTML = '<i data-lucide="info" class="w-5 h-5"></i>';
            }
            
            lucide.createIcons();
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 4000);
        }

        // --- LÓGICA DE SINCRONIZACIÓN MAESTRA (Inventario + Pendientes) ---
        async function loadData() {
            if (!EXCEL_API_URL) return;

            isSyncing = true;
            render();
            
            try {
                const url = EXCEL_API_URL + "?action=read_all&t=" + new Date().getTime();
                const res = await fetch(url, { redirect: 'follow' });
                
                if (!res.ok) throw new Error('Error en la respuesta del servidor');
                const data = await res.json(); 
                
                // Actualizar Inventario
                if (data.inventory) {
                    INVENTORY.forEach(item => {
                        if (data.inventory[item.id] !== undefined) {
                            item.stock = parseInt(data.inventory[item.id]);
                        }
                    });
                }

                // Actualizar Solicitudes Pendientes desde Excel
                if (data.pending) {
                    PENDING_REQUESTS = data.pending;
                }
                
                // Guardar un backup por si se va el internet
                localStorage.setItem('sicp_stock_data', JSON.stringify(INVENTORY));
                localStorage.setItem('sicp_pending_requests', JSON.stringify(PENDING_REQUESTS));

            } catch(e) {
                console.error("Error conectando a Excel:", e);
                showToast("⚠️ Modo sin conexión. Usando memoria local.");
                
                const savedInv = localStorage.getItem('sicp_stock_data');
                if (savedInv) INVENTORY = JSON.parse(savedInv);
                
                const savedReq = localStorage.getItem('sicp_pending_requests');
                if (savedReq) PENDING_REQUESTS = JSON.parse(savedReq);
            } finally {
                isSyncing = false;
                render();
            }
        }

        // Ajuste Rápido de Stock (Columna izquierda Admin)
        async function adminUpdateStock(id, nombreProducto, newStock) {
            const item = INVENTORY.find(i => i.id === id);
            item.stock = parseInt(newStock) || 0;
            
            localStorage.setItem('sicp_stock_data', JSON.stringify(INVENTORY));
            render(); 

            if (!EXCEL_API_URL) return;

            showToast(`Sincronizando <b>${item.name}</b>... ⏳`, 'info');

            try {
                const url = `${EXCEL_API_URL}?action=update&id=${id}&stock=${item.stock}&t=${new Date().getTime()}`;
                const res = await fetch(url, { redirect: 'follow' });
                if (!res.ok) throw new Error("Fallo en la respuesta");
                showToast(`✅ <b>${item.name}</b> guardado (${item.stock} uds.)`, 'success');
            } catch(e) {
                showToast(`❌ Error guardando ${item.name}. (Verifica permisos de Google)`, 'error');
            }
        }

        // --- PROCESAR SOLICITUD PENDIENTE (DESPACHO) ---
        async function processRequest(reqId) {
            if (!currentAdminSession) {
                alert("Error de sesión. Vuelve a ingresar tu PIN.");
                goToAdmin();
                return;
            }
            
            const request = PENDING_REQUESTS.find(r => r.id === reqId);
            if (!request) return;
            
            let updates = [];
            let finalItemsText = "";
            
            for (let index = 0; index < request.items.length; index++) {
                 const itemReq = request.items[index];
                 const inputEl = document.getElementById(`edit_qty_${reqId}_${index}`);
                 const approvedQty = inputEl ? parseInt(inputEl.value) || 0 : 0;

                 if (approvedQty > 0) {
                     const invItem = INVENTORY.find(i => i.id === itemReq.id);
                     if (invItem) {
                         if (approvedQty > invItem.stock) {
                             alert(`No puedes aprobar ${approvedQty} unidades de ${itemReq.name}. Solo hay ${invItem.stock} en stock.`);
                             return;
                         }
                         
                         invItem.stock = Math.max(0, invItem.stock - approvedQty);
                         updates.push({id: invItem.id, stock: invItem.stock});
                         
                         if (approvedQty !== itemReq.qty) {
                             finalItemsText += `${approvedQty}x ${itemReq.name} (Pidió ${itemReq.qty}), `;
                         } else {
                             finalItemsText += `${approvedQty}x ${itemReq.name}, `;
                         }
                     }
                 }
            }

            if (finalItemsText === "") {
                alert("La cantidad está en 0. Si no vas a entregar nada, usa el botón rojo de Rechazar.");
                return;
            }
            
            // Guardar local preventivo
            localStorage.setItem('sicp_stock_data', JSON.stringify(INVENTORY));
            PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
            localStorage.setItem('sicp_pending_requests', JSON.stringify(PENDING_REQUESTS));
            
            // REGISTRO OFICIAL EN EXCEL (Formulario)
            submitToGoogleForms(request.leaderName, finalItemsText, `PROCESADA (${currentAdminSession})`);
            
            render(); // Actualizamos la UI rápido
            
            // ELIMINAR DE EXCEL 'Pendientes' Y DESCONTAR STOCK
            if (EXCEL_API_URL) {
                showToast(`Despachando equipos... ⏳`, "info");
                try {
                    // Descontamos stock
                    await Promise.all(updates.map(u => {
                        const url = `${EXCEL_API_URL}?action=update&id=${u.id}&stock=${u.stock}&t=${new Date().getTime()}`;
                        return fetch(url, { redirect: 'follow' });
                    }));
                    
                    // Borramos de la hoja de pendientes
                    const delUrl = `${EXCEL_API_URL}?action=remove_pending&reqId=${reqId}&t=${new Date().getTime()}`;
                    await fetch(delUrl, { redirect: 'follow' });
                    
                    showToast("✅ Despachado y registrado en Excel.", "success");
                } catch(e) {
                    showToast("❌ Error al descontar de la base de datos.", "error");
                }
            }
        }
        
        // --- RECHAZAR SOLICITUD ---
        function rejectRequest(reqId) {
            if (confirm("¿Estás seguro de rechazar este pedido por completo?")) {
                const request = PENDING_REQUESTS.find(r => r.id === reqId);
                let originalItemsText = request.items.map(i => `${i.qty}x ${i.name}`).join(', ');
                
                // Anotar en Excel Formulario como Rechazada
                submitToGoogleForms(request.leaderName, originalItemsText, `RECHAZADA (${currentAdminSession})`);

                // Borrar local
                PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
                localStorage.setItem('sicp_pending_requests', JSON.stringify(PENDING_REQUESTS));
                render();

                // Borrar de Excel 'Pendientes'
                if (EXCEL_API_URL) {
                    const delUrl = `${EXCEL_API_URL}?action=remove_pending&reqId=${reqId}&t=${new Date().getTime()}`;
                    fetch(delUrl, { redirect: 'follow' }).catch(e=>console.error(e));
                }

                showToast("🚫 Solicitud rechazada. Registrado en Excel.", "info");
            }
        }

        function updateCart(id, change) {
            const item = INVENTORY.find(i => i.id === id);
            const currentQty = cart[id] || 0;
            const newQty = currentQty + change;

            if (newQty > item.stock) {
                alert(`¡Stock insuficiente! Solo quedan ${item.stock} unidades de ${item.name}.`);
                return;
            }

            cart[id] = newQty;
            if (cart[id] <= 0) delete cart[id];
            render();
        }

        function getTotalItems() { return Object.values(cart).reduce((a, b) => a + b, 0); }
        function goToCheckout() { currentView = 'checkout'; render(); window.scrollTo(0, 0); }
        function goToCatalog() { currentView = 'catalog'; loadData(); window.scrollTo(0, 0); }
        
        function goToAdmin() { 
            if(currentAdminSession) {
                currentView = 'admin';
                loadData(); // Asegurarnos de tener los datos frescos
            } else {
                currentView = 'login_admin'; 
            }
            render(); 
            window.scrollTo(0, 0); 
        }

        function exitAdmin() {
            currentAdminSession = ""; 
            goToCatalog();
            showToast("Sesión cerrada", "info");
        }

        function verifyAdminPin(event) {
            event.preventDefault();
            const pin = document.getElementById('adminPinInput').value;
            
            if (ADMIN_USERS[pin]) {
                currentAdminSession = ADMIN_USERS[pin]; 
                currentView = 'admin';
                loadData();
                render();
                showToast(`🔓 Bienvenido, ${currentAdminSession}`, "success");
            } else {
                showToast("❌ PIN incorrecto", "error");
                document.getElementById('adminPinInput').value = ''; 
                document.getElementById('adminPinInput').focus();    
            }
        }

        function submitToGoogleForms(name, itemsText, statusText) {
            if(GOOGLE_FORM_URL.includes("TU_ID_DE_FORMULARIO_AQUI")) return;
            let iframe = document.getElementById('hidden_iframe');
            if (!iframe) {
                iframe = document.createElement('iframe'); iframe.name = 'hidden_iframe'; iframe.id = 'hidden_iframe'; iframe.style.display = 'none';
                document.body.appendChild(iframe);
            }
            let form = document.createElement('form'); form.action = GOOGLE_FORM_URL; form.method = 'POST'; form.target = 'hidden_iframe';
            
            let finalName = name;
            if (statusText) {
                if (ENTRY_STATUS && ENTRY_STATUS !== "entry.000000000") {
                    let inputStatus = document.createElement('input'); 
                    inputStatus.type = 'hidden'; inputStatus.name = ENTRY_STATUS; inputStatus.value = statusText; 
                    form.appendChild(inputStatus);
                } else {
                    finalName = `${name} [${statusText}]`;
                }
            }

            let inputName = document.createElement('input'); inputName.type = 'hidden'; inputName.name = ENTRY_NAME; inputName.value = finalName; form.appendChild(inputName);
            let inputItems = document.createElement('input'); inputItems.type = 'hidden'; inputItems.name = ENTRY_ITEMS; inputItems.value = itemsText; form.appendChild(inputItems);
            
            document.body.appendChild(form); form.submit();
        }

        // --- LÍDER HACE EL PEDIDO (Se va a Excel 'Pendientes') ---
        function processOrder(event) {
            event.preventDefault();
            const nameSelect = document.getElementById('leaderName');
            const name = nameSelect.value;
            
            if (!name || name === "") {
                alert('Por favor selecciona tu nombre de la lista');
                nameSelect.focus();
                return;
            }

            let messageWA = `Hola Sistemas, soy *${name.trim()}*.%0A%0ASolicito los siguientes equipos para mi área:%0A%0A`;
            let reqItems = [];

            for (const [id, qty] of Object.entries(cart)) {
                const item = INVENTORY.find(i => i.id === id);
                messageWA += `▪️ ${qty}x ${item.name}%0A`;
                reqItems.push({ id: item.id, name: item.name, qty: qty });
            }

            messageWA += `%0A_Enviado desde el Portal de Solicitudes SISTEMAS_FYDI_`;
            
            const newRequest = {
                id: 'req_' + Date.now(),
                leaderName: name.trim(),
                items: reqItems,
                date: new Date().toLocaleString()
            };

            // 1. Enviar a la nueva pestaña de Excel 'Pendientes'
            if (EXCEL_API_URL) {
                const itemsStr = encodeURIComponent(JSON.stringify(reqItems));
                const url = `${EXCEL_API_URL}?action=add_pending&reqId=${newRequest.id}&leader=${encodeURIComponent(newRequest.leaderName)}&items=${itemsStr}&date=${encodeURIComponent(newRequest.date)}&t=${new Date().getTime()}`;
                fetch(url, { redirect: 'follow' }).catch(e=>console.error(e));
            }

            // 2. Guardar backup local
            PENDING_REQUESTS.push(newRequest);
            localStorage.setItem('sicp_pending_requests', JSON.stringify(PENDING_REQUESTS));

            // 3. Abrir WhatsApp
            window.open(`https://api.whatsapp.com/send?text=${messageWA}`, '_blank');
            
            cart = {};
            currentView = 'success';
            render();
            window.scrollTo(0, 0);
        }

        function render() {
            let html = '';
            
            if (currentView === 'catalog') {
                floatingCart.style.display = getTotalItems() > 0 ? 'flex' : 'none';
                cartCountEl.innerText = getTotalItems();

                if (isSyncing) {
                    html += `
                    <div class="text-center py-20 text-indigo-500">
                        <i data-lucide="loader-2" class="w-12 h-12 animate-spin mx-auto mb-4"></i>
                        <p class="font-bold text-lg mt-2">Conectando con bodega...</p>
                    </div>`;
                } else {
                    html += '<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 animate-fade-in-up">';
                    
                    INVENTORY.forEach(item => {
                        const qty = cart[item.id] || 0;
                        const isOutOfStock = item.stock <= 0; 
                        
                        html += `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full relative ${isOutOfStock ? 'opacity-60 grayscale-[50%]' : 'hover:shadow-md transition-shadow'}">
                            ${isOutOfStock ? `
                            <div class="absolute inset-0 bg-white/40 z-10 flex items-center justify-center backdrop-blur-[1px]">
                                <div class="bg-red-500 text-white px-4 py-1.5 rounded-lg font-black tracking-widest text-sm shadow-lg border border-white transform -rotate-12">AGOTADO</div>
                            </div>` : `
                            <div class="absolute top-2 right-2 z-10 bg-slate-800 text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">Disp: ${item.stock}</div>
                            `}
                            <div class="h-32 flex items-center justify-center ${item.bg}"><i data-lucide="${item.icon}" class="${item.color}" style="width: 48px; height: 48px;"></i></div>
                            <div class="p-5 flex flex-col flex-grow relative bg-white">
                                <div class="mb-4 flex-grow text-center">
                                    <p class="text-xs text-slate-500 font-semibold mb-1 uppercase tracking-wider">${item.category}</p>
                                    <h3 class="text-lg font-bold text-slate-800 leading-tight">${item.name}</h3>
                                </div>
                                <div class="mt-auto pt-4 border-t border-slate-100">
                                    <div class="flex items-center bg-slate-50 rounded-lg p-1 w-full justify-between border border-slate-200 relative z-20">
                                        <button onclick="updateCart('${item.id}', -1)" ${qty === 0 || isOutOfStock ? 'disabled' : ''} class="p-2 rounded-md hover:bg-white text-slate-600 disabled:opacity-30 transition-all shadow-sm"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                        <span class="font-bold text-slate-800 w-8 text-center text-lg">${qty}</span>
                                        <button onclick="updateCart('${item.id}', 1)" ${isOutOfStock || qty >= item.stock ? 'disabled' : ''} class="p-2 rounded-md bg-white text-indigo-600 shadow-sm hover:text-indigo-800 transition-all border border-slate-100 disabled:opacity-30 disabled:shadow-none"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    });
                    html += '</div>';
                }
            } 
            else if (currentView === 'login_admin') {
                floatingCart.style.display = 'none';
                html += `
                <div class="max-w-md mx-auto mt-12 text-center animate-fade-in-up bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-slate-200">
                    <div class="flex justify-center mb-6">
                        <div class="bg-slate-100 p-5 rounded-full text-slate-800 shadow-inner">
                            <i data-lucide="lock" style="width: 48px; height: 48px;"></i>
                        </div>
                    </div>
                    <h2 class="text-3xl font-black text-slate-800 mb-2">Ingresa tu PIN</h2>
                    <p class="text-slate-500 mb-8 text-sm font-medium">El sistema registrará tus operaciones bajo tu nombre.</p>
                    <form onsubmit="verifyAdminPin(event)">
                        <input type="password" id="adminPinInput" placeholder="****" class="w-full border-2 border-slate-200 rounded-2xl px-4 py-4 mb-6 focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-center text-4xl tracking-[0.5em] font-black transition-all text-slate-800 shadow-sm" required autofocus>
                        <button type="submit" class="w-full py-4 rounded-2xl bg-slate-900 text-white hover:bg-slate-800 font-black transition-all shadow-[0_10px_30px_-10px_rgba(0,0,0,0.5)] flex items-center justify-center text-lg">
                            <i data-lucide="key-round" class="w-6 h-6 mr-3"></i> Validar Identidad
                        </button>
                    </form>
                    <button onclick="goToCatalog()" class="mt-8 text-sm text-slate-400 hover:text-slate-600 transition-colors font-bold">
                        <i data-lucide="arrow-left" class="inline w-4 h-4 mr-1"></i> Cancelar
                    </button>
                </div>`;
            }
            else if (currentView === 'admin') {
                floatingCart.style.display = 'none';
                
                html += `
                <div class="max-w-6xl mx-auto space-y-6 animate-fade-in-up pb-10">
                    <div class="flex justify-between items-center mb-2">
                        <button onclick="exitAdmin()" class="flex items-center text-red-500 hover:text-red-700 font-bold bg-white px-4 py-2 rounded-lg border border-red-200 shadow-sm transition-colors w-fit">
                            <i data-lucide="log-out" class="w-4 h-4 mr-2"></i> Cerrar Sesión Segura
                        </button>
                        <div class="bg-indigo-100 text-indigo-800 px-4 py-2 rounded-lg font-bold text-sm flex items-center shadow-sm">
                            <i data-lucide="user-check" class="w-4 h-4 mr-2"></i> Técnico: ${currentAdminSession}
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        
                        <!-- COLUMNA 1: SOLICITUDES PENDIENTES -->
                        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col">
                            <div class="bg-indigo-600 px-6 py-5 text-white">
                                <h2 class="text-xl font-black flex items-center"><i data-lucide="inbox" class="mr-2"></i> Solicitudes Pendientes</h2>
                                <p class="text-indigo-100 mt-1 text-xs">Revisa y ajusta las cantidades. Al despachar, se anotará en el Excel.</p>
                            </div>
                            <div class="p-6 flex-grow bg-slate-50">
                `;
                
                if (PENDING_REQUESTS.length === 0) {
                    html += `
                                <div class="text-center py-10">
                                    <i data-lucide="check-circle-2" class="w-16 h-16 text-slate-300 mx-auto mb-4"></i>
                                    <p class="text-slate-500 font-medium">No hay pedidos pendientes.</p>
                                </div>
                    `;
                } else {
                    html += `<div class="space-y-4">`;
                    PENDING_REQUESTS.forEach(req => {
                        
                        let itemsHtml = req.items.map((i, index) => `
                            <li class="flex items-center justify-between text-sm mb-2 last:mb-0">
                                <span class="text-slate-700 font-medium">${i.name} <span class="text-xs text-slate-400 block sm:inline">(Solicitó ${i.qty})</span></span>
                                <div class="flex items-center bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm flex-shrink-0">
                                    <input type="number" id="edit_qty_${req.id}_${index}" min="0" max="${i.qty}" value="${i.qty}" class="w-12 text-center py-1 focus:bg-indigo-50 outline-none text-slate-800 font-bold text-sm">
                                </div>
                            </li>
                        `).join('');
                        
                        html += `
                                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                    <div class="flex justify-between items-start mb-3">
                                        <div>
                                            <h4 class="font-bold text-slate-800">${req.leaderName}</h4>
                                            <p class="text-xs text-slate-500">${req.date}</p>
                                        </div>
                                    </div>
                                    <ul class="mb-4 text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                        ${itemsHtml}
                                    </ul>
                                    <div class="flex justify-between items-center border-t border-slate-100 pt-3 mt-2">
                                        <button onclick="rejectRequest('${req.id}')" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold hover:bg-red-100 transition-colors" title="Rechazar pedido">Rechazar</button>
                                        <button onclick="processRequest('${req.id}')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors flex items-center shadow-md"><i data-lucide="check-square" class="w-4 h-4 mr-2"></i> Despachar</button>
                                    </div>
                                </div>
                        `;
                    });
                    html += `</div>`;
                }

                html += `
                            </div>
                        </div>

                        <!-- COLUMNA 2: STOCK GENERAL -->
                        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col">
                            <div class="bg-slate-900 px-6 py-5 text-white flex justify-between items-center">
                                <div>
                                    <h2 class="text-xl font-black flex items-center"><i data-lucide="package-search" class="mr-2 text-emerald-400"></i> Ajuste Directo de Stock</h2>
                                    <p class="text-slate-400 mt-1 text-xs">
                                        ${currentAdminSession === "David Cajias" 
                                            ? "Usa esto solo para ingresar mercadería nueva a bodega." 
                                            : "Vista de solo lectura del inventario actual."}
                                    </p>
                                </div>
                                ${currentAdminSession !== "David Cajias" ? '<div class="bg-slate-800 text-xs px-2 py-1 rounded flex items-center text-slate-400 border border-slate-700"><i data-lucide="lock" class="w-3 h-3 mr-1"></i> Solo Lectura</div>' : ''}
                            </div>
                            <div class="p-6 overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead>
                                        <tr class="text-[10px] font-black uppercase text-slate-400 border-b-2 border-slate-100">
                                            <th class="pb-2">Producto</th>
                                            <th class="pb-2 text-center">Unidades</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                `;

                INVENTORY.forEach(item => {
                    const isZero = item.stock <= 0;
                    
                    const isSuperAdmin = currentAdminSession === "David Cajias";
                    
                    const stockInputHtml = isSuperAdmin 
                        ? `<input type="number" value="${item.stock}" onchange="adminUpdateStock('${item.id}', '${item.name}', this.value)" class="w-16 text-center text-sm font-bold border border-slate-300 rounded px-1 py-1 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all ${isZero ? 'text-red-600 bg-red-50' : 'text-slate-700'}">`
                        : `<div class="w-16 mx-auto text-center text-sm font-bold bg-slate-50 border border-slate-200 rounded px-1 py-1 cursor-not-allowed select-none ${isZero ? 'text-red-500 bg-red-50/50' : 'text-slate-500'}">${item.stock}</div>`;

                    html += `
                                        <tr class="hover:bg-slate-50 transition-colors">
                                            <td class="py-3 flex items-center gap-2">
                                                <span class="font-semibold text-slate-700 text-sm">${item.name}</span>
                                            </td>
                                            <td class="py-3 text-center">
                                                ${stockInputHtml}
                                            </td>
                                        </tr>
                    `;
                });

                html += `
                                    </tbody>
                                </table>
                                ${currentAdminSession === "David Cajias" ? `
                                <div class="mt-8 text-center text-sm text-slate-500 font-medium bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <i data-lucide="info" class="inline w-4 h-4 mr-1 text-indigo-500"></i> Modifica un número, haz clic fuera del cuadro para guardar automáticamente.
                                </div>
                                ` : ''}
                            </div>
                        </div>

                    </div>
                </div>`;
            }
            else if (currentView === 'checkout') {
                floatingCart.style.display = 'none';
                let opcionesLideres = LIDERES.map(lider => `<option value="${lider}">${lider}</option>`).join('');

                html += `
                <div class="max-w-2xl mx-auto space-y-6 animate-fade-in-up pb-10">
                    <button onclick="goToCatalog()" class="flex items-center text-indigo-600 hover:text-indigo-800 font-medium mb-4">
                        <i data-lucide="arrow-left" class="w-5 h-5 mr-1"></i> Seguir agregando equipos
                    </button>
                    <h2 class="text-3xl font-bold text-slate-800">Finalizar Solicitud</h2>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8">
                        <form onsubmit="processOrder(event)">
                            <div class="mb-8">
                                <label class="block text-sm font-bold text-slate-700 mb-2">Tu Nombre (Líder Solicitante)</label>
                                <select id="leaderName" required autofocus class="w-full border-2 border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-lg transition-all bg-white cursor-pointer appearance-none">
                                    <option value="" disabled selected>-- Selecciona tu nombre en la lista --</option>
                                    ${opcionesLideres}
                                </select>
                            </div>
                            
                            <h3 class="font-bold text-slate-700 mb-4 border-b-2 border-slate-100 pb-2">Tu Pedido</h3>
                            <ul class="divide-y divide-slate-100 mb-8">
                `;
                
                for (const [id, qty] of Object.entries(cart)) {
                    const item = INVENTORY.find(i => i.id === id);
                    html += `
                        <li class="py-4 flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <div class="w-12 h-12 rounded-lg flex items-center justify-center ${item.bg}">
                                    <i data-lucide="${item.icon}" class="${item.color}"></i>
                                </div>
                                <p class="font-bold text-slate-800 text-lg">${item.name}</p>
                            </div>
                            <span class="font-bold text-indigo-700 bg-indigo-50 px-4 py-2 rounded-lg text-lg border border-indigo-100">x${qty}</span>
                        </li>
                    `;
                }

                html += `
                            </ul>
                            <button type="submit" class="w-full py-4 text-lg rounded-xl bg-green-600 text-white hover:bg-green-700 focus:ring-green-500 shadow-md flex items-center justify-center font-black transition-all">
                                <i data-lucide="send" class="w-6 h-6 mr-2"></i> Enviar Pedido
                            </button>
                            <p class="text-center text-xs text-slate-400 mt-4">Esto notificará a Sistemas. El stock no se descuenta hasta que recibas el equipo físicamente.</p>
                        </form>
                    </div>
                </div>`;
            }
            else if (currentView === 'success') {
                floatingCart.style.display = 'none';
                html += `
                <div class="max-w-md mx-auto mt-20 text-center animate-fade-in-up bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-center mb-6">
                        <div class="bg-emerald-100 p-6 rounded-full text-emerald-600">
                            <i data-lucide="check-circle" style="width: 64px; height: 64px;"></i>
                        </div>
                    </div>
                    <h2 class="text-3xl font-bold text-slate-800 mb-4">¡Pedido Enviado!</h2>
                    <p class="text-slate-600 mb-8 text-lg">
                        El equipo de Sistemas ha recibido tu solicitud y está pendiente de aprobación.
                    </p>
                    <p class="text-slate-500 text-sm mb-6">Recuerda presionar "Enviar" en el chat de WhatsApp que se acaba de abrir.</p>
                    <button onclick="goToCatalog()" class="w-full py-3 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200 font-medium transition-all">
                        Volver al inicio
                    </button>
                </div>`;
            }

            container.innerHTML = html;
            lucide.createIcons(); 
        }

        // Iniciar
        loadData();
    </script>
</body>
</html>
