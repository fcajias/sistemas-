    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
        .progress-bar { transition: width 1s ease-in-out; }
        
        /* ==========================================
           MOLDE CORPORATIVO PARA IMPRESIÓN Y PDF
           ========================================== */
        @media print {
            @page { margin: 10mm; size: A4 portrait; }
            body { 
                background: white !important; 
                color: black !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
                font-size: 11px !important;
            }
            /* Ocultar elementos de la interfaz web */
            header, #floating-cart, .no-print, button, .modal-close-btn { 
                display: none !important; 
            }
            /* Mostrar elementos que solo van en el PDF */
            .print-only { display: block !important; }
            .print-flex { display: flex !important; }
            
            /* Forzar que las cuadrículas se mantengan en el papel (no se apilen) */
            .print-grid-4 { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 1rem !important; }
            .print-grid-3 { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 1rem !important; }
            .print-grid-2 { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 1rem !important; }
            
            /* Evitar que las cajas o tablas se corten por la mitad de la hoja */
            .prevent-break { page-break-inside: avoid !important; break-inside: avoid !important; margin-bottom: 1.5rem !important; }
            
            /* Limpiar el diseño de las tarjetas (quitar sombras web) */
            .bg-white, .dark\:bg-slate-800 { 
                background: white !important; 
                border: 1px solid #e2e8f0 !important; 
                box-shadow: none !important; 
                border-radius: 8px !important;
                color: #1e293b !important;
            }
            
            /* Limpiar inputs para que parezcan texto normal */
            input { 
                border: none !important; 
                background: transparent !important; 
                font-weight: 900 !important; 
                color: black !important;
                padding: 0 !important;
                text-align: center !important;
            }

            /* Estilo limpio para tablas en PDF */
            table { border-collapse: collapse !important; width: 100% !important; }
            th { border-bottom: 2px solid #cbd5e1 !important; color: #475569 !important; font-size: 10px !important; }
            td { border-bottom: 1px solid #f1f5f9 !important; padding: 6px !important; font-size: 11px !important;}
            .overflow-x-auto { overflow: visible !important; max-height: none !important; }
        }
        .print-only, .print-flex { display: none; }
    </style>
</head>

            if(!dateStr) return '';
            if(dateStr.toString().includes('GMT')) {
                const d = new Date(dateStr);
                if(!isNaN(d)) return d.toLocaleDateString('es-EC');
            }
            return dateStr;

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerHTML = msg;
            toast.className = `fixed top-20 right-4 sm:right-8 text-white px-5 py-3 rounded-2xl shadow-2xl transform transition-all duration-300 translate-x-[150%] z-50 flex items-center gap-3 font-medium border ${type === 'error' ? 'bg-red-600 border-red-500' : type==='success' ? 'bg-emerald-600 border-emerald-500' : 'bg-slate-900 dark:bg-slate-800 border-slate-700 dark:border-slate-600'} no-print`;
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 4000);
        }

        function askConfirm(msg, actionName, payloadData) {
            confirmConfig = { isOpen: true, message: msg, action: actionName, payload: payloadData };
            render();
        }
        function closeConfirm() {
            confirmConfig.isOpen = false;
            render();
        }
        function executeConfirm() {
            const { action, payload } = confirmConfig;
            closeConfirm();
            if (action === 'receivePurchase') executeReceivePurchase(payload);
            else if (action === 'deletePurchase') executeDeletePurchase(payload);
            else if (action === 'rejectRequest') executeRejectRequest(payload);

        async function loadData() {
            if (!EXCEL_API_URL) return;
            isSyncing = true;
            render();
            try {
                const res = await fetch(`${EXCEL_API_URL}?action=read_all&t=${new Date().getTime()}`, { redirect: 'follow' });
                if (!res.ok) throw new Error('Error en servidor');
                const data = await res.json(); 
                
                if (data.inventory) {
                    INVENTORY.forEach(item => {
                        if (data.inventory[item.id] !== undefined) {
                            item.stock = parseInt(data.inventory[item.id].stock);
                            item.lastModBy = data.inventory[item.id].lastModifiedBy || "-";
                            item.lastModDate = data.inventory[item.id].lastModifiedDate || "-";
                        }
                    });
                }
                if (data.pending) PENDING_REQUESTS = data.pending;
                if (data.purchases) PURCHASES = data.purchases; 
                if (data.audit && data.audit.length > 0) {
                    AUDIT_LOG = data.audit;
                    localStorage.setItem('sicp_audit_log', JSON.stringify(AUDIT_LOG));
                }
            } catch(e) {} finally {
                isSyncing = false;
                render();
            }
        }

        function startBackgroundSync() {
            if (backgroundSyncTimer) clearInterval(backgroundSyncTimer);
            backgroundSyncTimer = setInterval(async () => {
                if (currentView !== 'admin' || !EXCEL_API_URL || isProcessing) return; 
                try {
                    const res = await fetch(`${EXCEL_API_URL}?action=read_all&t=${new Date().getTime()}`, { redirect: 'follow' });
                    if (!res.ok) return;
                    const data = await res.json(); 
                    let hasChanges = false;
                    
                    if (data.pending && JSON.stringify(PENDING_REQUESTS) !== JSON.stringify(data.pending)) {
                        PENDING_REQUESTS = data.pending; hasChanges = true;
                    }
                    if (data.purchases && JSON.stringify(PURCHASES) !== JSON.stringify(data.purchases)) {
                        PURCHASES = data.purchases; hasChanges = true;
                    }
                    if (data.inventory) {
                        INVENTORY.forEach(item => {
                            if (data.inventory[item.id] !== undefined) {
                                const newData = data.inventory[item.id];
                                if (item.stock !== parseInt(newData.stock) || item.lastModDate !== newData.lastModifiedDate) { 
                                    item.stock = parseInt(newData.stock); item.lastModBy = newData.lastModifiedBy; item.lastModDate = newData.lastModifiedDate; hasChanges = true; 
                                }
                            }
                        });
                    }
                    if (data.audit && JSON.stringify(AUDIT_LOG) !== JSON.stringify(data.audit)) {
                        AUDIT_LOG = data.audit; hasChanges = true;
                    }
                    
                    if (hasChanges && document.activeElement.tagName !== 'INPUT') render();
                } catch(e) {}
            }, 10000); 
        }
        function stopBackgroundSync() { if (backgroundSyncTimer) { clearInterval(backgroundSyncTimer); backgroundSyncTimer = null; } }

        async function processRequest(reqId) {
            if (!currentAdminSession) { goToAdmin(); return; }
            const request = PENDING_REQUESTS.find(r => r.id === reqId);
            if (!request) return;
            
            isProcessing = true; 
            try {
                let updates = [];
                let finalItemsText = "";
                const nowStr = new Date().toLocaleTimeString();
                
                for (let index = 0; index < request.items.length; index++) {
                     const itemReq = request.items[index];
                     const inputEl = document.getElementById(`edit_qty_${reqId}_${index}`);
                     const approvedQty = inputEl ? parseInt(inputEl.value) || 0 : 0;

                     if (approvedQty > 0) {
                         const invItem = INVENTORY.find(i => i.id === itemReq.id);
                         if (invItem) {
                             if (approvedQty > invItem.stock) { showToast(`Stock insuficiente de ${itemReq.name}`, "error"); return; }
                             invItem.stock = Math.max(0, invItem.stock - approvedQty);
                             invItem.lastModBy = currentAdminSession;
                             invItem.lastModDate = nowStr;
                             updates.push({id: invItem.id, stock: invItem.stock, user: currentAdminSession, date: nowStr});
                             
                             logAuditAction('Despacho', itemReq.name, -approvedQty);
                             finalItemsText += approvedQty !== itemReq.qty ? `${approvedQty}x ${itemReq.name} (Pidió ${itemReq.qty}), ` : `${approvedQty}x ${itemReq.name}, `;
                         }
                     }
                }
                if (finalItemsText === "") return;
                PENDING_REQUESTS = PENDING_REQUESTS.filter(r => r.id !== reqId);
                submitToGoogleForms(request.leaderName, finalItemsText, `PROCESADA (${currentAdminSession})`);
                render(); 
                showToast("⏳ Despachando y actualizando nube...", "info");
                
                if (EXCEL_API_URL) {
                    await Promise.all(updates.map(u => fetch(`${EXCEL_API_URL}?action=update&id=${encodeURIComponent(u.id)}&stock=${u.stock}&user=${encodeURIComponent(u.user)}&date=${encodeURIComponent(u.date)}&t=${new Date().getTime()}`, { redirect: 'follow' })));
                    await fetch(`${EXCEL_API_URL}?action=remove_pending&reqId=${encodeURIComponent(reqId)}&t=${new Date().getTime()}`, { redirect: 'follow' });
                    showToast("✅ Despacho finalizado con éxito.", "success");
                }
            } catch(e) {
                showToast("❌ Error al procesar solicitud.", "error");
            } finally {
                isProcessing = false;
            }
        }
